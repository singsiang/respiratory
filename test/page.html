<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Respiratory 專案網頁導覽</title>
    <!-- 引入 Tailwind CSS (CDN) 用於排版與樣式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons (CDN) 用於圖示 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 隱藏 Iframe 的滾動條，確保縮圖畫面乾淨 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col overflow-x-hidden w-full">

    <!-- 頂部導覽列 -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
        <div class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-3 sm:py-4">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-3 sm:gap-4">
                <div class="flex items-center gap-3">
                    <div class="p-1.5 sm:p-2 bg-blue-100 text-blue-600 rounded-lg">
                        <i data-lucide="layout-grid" class="w-5 h-5 sm:w-6 sm:h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-lg sm:text-xl font-bold text-slate-800">Respiratory 網頁總覽</h1>
                        <p class="text-xs sm:text-sm text-slate-500" id="repo-name-display">singsiang/respiratory</p>
                    </div>
                </div>
                
                <div class="flex gap-2 sm:gap-3 w-full sm:w-auto">
                    <a id="github-repo-link" href="https://github.com/singsiang/respiratory" target="_blank" rel="noopener noreferrer" class="w-full sm:w-auto justify-center inline-flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-900 text-white text-sm font-medium rounded-lg transition-colors">
                        <i data-lucide="github" class="w-4 h-4"></i>
                        GitHub 原始碼
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-6 sm:py-8 flex-grow w-full">
        <!-- 搜尋與過濾、檢視切換列 -->
        <div class="mb-6 sm:mb-8 flex flex-col lg:flex-row gap-3 z-10 w-full mx-auto">
            
            <!-- 檢視模式切換 (預設為資料夾) -->
            <div class="flex bg-slate-200/70 p-1 rounded-xl flex-shrink-0">
                <button id="btn-folder-view" onclick="setView('folder')" class="flex-1 sm:flex-none px-4 py-2 sm:py-2.5 text-sm sm:text-base font-bold rounded-lg bg-white shadow-sm text-blue-600 flex items-center justify-center gap-2 transition-all">
                    <i data-lucide="list-tree" class="w-4 h-4 sm:w-5 sm:h-5"></i> 資料夾檢視
                </button>
                <button id="btn-grid-view" onclick="setView('grid')" class="flex-1 sm:flex-none px-4 py-2 sm:py-2.5 text-sm sm:text-base font-medium rounded-lg text-slate-500 hover:text-slate-700 flex items-center justify-center gap-2 transition-all">
                    <i data-lucide="grid" class="w-4 h-4 sm:w-5 sm:h-5"></i> 預覽圖檢視
                </button>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 flex-grow">
                <!-- 資料夾下拉選單 -->
                <div class="relative sm:w-1/3 flex-shrink-0">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i data-lucide="folder" class="h-4 w-4 sm:h-5 sm:w-5 text-slate-400"></i>
                    </div>
                    <select id="folder-select" class="block w-full pl-10 pr-10 py-2.5 sm:py-3 border border-slate-300 rounded-xl leading-5 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base transition-shadow shadow-sm appearance-none cursor-pointer text-slate-700">
                        <option value="">所有資料夾</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 pr-3.5 flex items-center pointer-events-none">
                        <i data-lucide="chevron-down" class="h-4 w-4 sm:h-5 sm:w-5 text-slate-400"></i>
                    </div>
                </div>

                <!-- 搜尋列 -->
                <div class="relative flex-grow">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i data-lucide="search" class="h-4 w-4 sm:h-5 sm:w-5 text-slate-400"></i>
                    </div>
                    <input type="text" id="search-input" class="block w-full pl-10 sm:pl-12 pr-4 py-2.5 sm:py-3 border border-slate-300 rounded-xl leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base transition-shadow shadow-sm" placeholder="搜尋檔案名稱或路徑...">
                </div>
            </div>
        </div>

        <!-- 狀態顯示區塊 (載入中) -->
        <div id="loading-state" class="flex flex-col items-center justify-center py-20 text-slate-500">
            <i data-lucide="loader-2" class="w-8 h-8 sm:w-10 sm:h-10 animate-spin mb-4 text-blue-500"></i>
            <p class="text-base sm:text-lg font-medium">正在載入專案檔案列表...</p>
        </div>

        <!-- 狀態顯示區塊 (錯誤) -->
        <div id="error-state" class="hidden bg-red-50 border-l-4 border-red-500 p-4 rounded-lg mb-8 shadow-sm">
            <div class="flex items-start">
                <i data-lucide="alert-circle" class="w-5 h-5 text-red-500 mt-0.5 mr-3 flex-shrink-0"></i>
                <div>
                    <h3 class="text-red-800 font-medium text-base sm:text-lg">載入失敗</h3>
                    <p id="error-message" class="text-red-600 mt-1 text-sm sm:text-base"></p>
                </div>
            </div>
        </div>

        <!-- 檔案列表區塊 -->
        <div id="content-state" class="hidden space-y-4 sm:space-y-6">
            <div class="flex justify-between items-end border-b border-slate-200 pb-2 sm:pb-3">
                <h2 class="text-base sm:text-lg font-semibold text-slate-700 flex items-center gap-2">
                    <i data-lucide="layers" class="w-4 h-4 sm:w-5 sm:h-5 text-blue-500"></i>
                    共找到 <span id="file-count" class="text-blue-600 font-bold mx-1">0</span> 個網頁
                </h2>
            </div>

            <!-- 空狀態 -->
            <div id="empty-state" class="hidden text-center py-12 sm:py-16 bg-white rounded-2xl border border-slate-200 border-dashed shadow-sm">
                <div class="bg-slate-50 w-16 h-16 sm:w-20 sm:h-20 rounded-full flex items-center justify-center mx-auto mb-3 sm:mb-4">
                    <i data-lucide="file-question" class="h-8 w-8 sm:h-10 sm:w-10 text-slate-400"></i>
                </div>
                <p class="text-slate-600 text-base sm:text-lg font-medium">找不到符合條件的網頁檔案</p>
                <p class="text-slate-400 text-xs sm:text-sm mt-1">請嘗試使用其他搜尋關鍵字或選擇其他資料夾</p>
            </div>

            <!-- 資料夾檢視容器 (預設顯示) -->
            <div id="folder-container" class="space-y-6">
                <!-- 資料夾將由 JavaScript 動態生成 -->
            </div>

            <!-- 預覽圖檢視容器 (預設隱藏) -->
            <div id="grid-container" class="hidden grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 sm:gap-6">
                <!-- 卡片將由 JavaScript 動態生成 -->
            </div>
        </div>
    </main>

    <!-- 頁尾 -->
    <footer class="bg-white border-t border-slate-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:py-6 text-center text-xs sm:text-sm text-slate-500 flex flex-col sm:flex-row justify-center items-center gap-1 sm:gap-2">
            <span>自動同步自 GitHub API</span>
            <span class="hidden sm:inline">·</span>
            <span class="flex items-center gap-1"><i data-lucide="code-2" class="w-3 h-3 sm:w-4 sm:h-4"></i> 動態檔案總覽</span>
        </div>
    </footer>

    <!-- 主要邏輯 Script -->
    <script>
        // 初始化 Lucide 圖示
        lucide.createIcons();

        // 專案設定
        const OWNER = 'singsiang';
        const REPO = 'respiratory';
        const GITHUB_PAGES_BASE = `https://${OWNER}.github.io/${REPO}`;
        
        // 全域變數
        let allFiles = [];
        let currentFiles = []; // 儲存目前過濾後的檔案列表
        let defaultBranch = 'main';
        let currentView = 'folder'; // 預設檢視模式：'folder' 或 'grid'

        // DOM 元素
        const searchInput = document.getElementById('search-input');
        const folderSelect = document.getElementById('folder-select');
        const loadingState = document.getElementById('loading-state');
        const errorState = document.getElementById('error-state');
        const errorMessage = document.getElementById('error-message');
        const contentState = document.getElementById('content-state');
        const emptyState = document.getElementById('empty-state');
        const fileCount = document.getElementById('file-count');
        const folderContainer = document.getElementById('folder-container');
        const gridContainer = document.getElementById('grid-container');

        // 主程式載入
        async function fetchRepositoryData() {
            try {
                showState('loading');

                const repoRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}`);
                if (repoRes.status === 403) throw new Error('GitHub API 請求次數達上限，請稍後再試。');
                if (!repoRes.ok) throw new Error('找不到指定的 GitHub 專案，請確認專案是否為公開狀態。');
                
                const repoData = await repoRes.json();
                defaultBranch = repoData.default_branch || 'main';

                const treeRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${defaultBranch}?recursive=1`);
                if (!treeRes.ok) throw new Error('無法讀取專案檔案列表。');
                
                const treeData = await treeRes.json();

                allFiles = treeData.tree
                    .filter(item => item.type === 'blob' && item.path.toLowerCase().endsWith('.html') && item.path !== 'index.html')
                    .map(file => ({
                        path: file.path,
                        name: file.path.split('/').pop(),
                        directory: file.path.includes('/') ? file.path.substring(0, file.path.lastIndexOf('/')) : '根目錄'
                    }));

                // 提取所有獨立的資料夾並動態產生下拉選單選項
                const directories = [...new Set(allFiles.map(f => f.directory))].sort();
                directories.forEach(dir => {
                    const option = document.createElement('option');
                    option.value = dir;
                    option.textContent = dir;
                    folderSelect.appendChild(option);
                });

                currentFiles = allFiles; // 初始狀態
                renderCurrentView(); // 渲染預設的資料夾檢視
                showState('content');

            } catch (error) {
                errorMessage.textContent = error.message;
                showState('error');
            }
        }

        // 切換檢視模式
        function setView(view) {
            currentView = view;
            
            const btnFolder = document.getElementById('btn-folder-view');
            const btnGrid = document.getElementById('btn-grid-view');
            
            const activeClasses = ['bg-white', 'shadow-sm', 'text-blue-600', 'font-bold'];
            const inactiveClasses = ['text-slate-500', 'hover:text-slate-700', 'font-medium'];

            if (view === 'folder') {
                btnFolder.classList.remove(...inactiveClasses);
                btnFolder.classList.add(...activeClasses);
                btnGrid.classList.remove(...activeClasses);
                btnGrid.classList.add(...inactiveClasses);
                
                gridContainer.classList.add('hidden');
                folderContainer.classList.remove('hidden');
            } else {
                btnGrid.classList.remove(...inactiveClasses);
                btnGrid.classList.add(...activeClasses);
                btnFolder.classList.remove(...activeClasses);
                btnFolder.classList.add(...inactiveClasses);
                
                folderContainer.classList.add('hidden');
                gridContainer.classList.remove('hidden');
            }

            renderCurrentView(); // 重新渲染當前過濾的檔案到指定視圖
        }

        // 統一渲染入口
        function renderCurrentView() {
            fileCount.textContent = currentFiles.length;

            if (currentFiles.length === 0) {
                folderContainer.innerHTML = '';
                gridContainer.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            // 只有在當前模式下才進行 DOM 的渲染，節省資源
            if (currentView === 'folder') {
                renderFolderFiles(currentFiles);
            } else {
                renderGridFiles(currentFiles);
            }
            lucide.createIcons();
        }

        // 渲染資料夾檢視模式 (預設，輕量級)
        function renderFolderFiles(filesToRender) {
            // 將檔案依據 directory 分群
            const groupedFiles = filesToRender.reduce((acc, file) => {
                if (!acc[file.directory]) acc[file.directory] = [];
                acc[file.directory].push(file);
                return acc;
            }, {});

            // 將分群結果轉換為 HTML
            folderContainer.innerHTML = Object.keys(groupedFiles).sort().map(folderName => {
                const filesInFolder = groupedFiles[folderName];
                const displayName = folderName === '根目錄' ? '/' : folderName;
                
                return `
                <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                    <!-- 資料夾標頭 -->
                    <div class="bg-slate-50 border-b border-slate-200 px-4 sm:px-5 py-3 flex items-center gap-3">
                        <i data-lucide="folder-open" class="w-5 h-5 sm:w-6 sm:h-6 text-blue-500 flex-shrink-0"></i>
                        <h3 class="font-bold text-slate-800 text-base sm:text-lg break-all">${displayName}</h3>
                        <span class="ml-auto text-xs font-medium text-slate-500 bg-slate-200 px-2 py-0.5 rounded-full flex-shrink-0">
                            ${filesInFolder.length}
                        </span>
                    </div>
                    <!-- 檔案清單 -->
                    <ul class="divide-y divide-slate-100">
                        ${filesInFolder.map(file => {
                            const pagesUrl = `${GITHUB_PAGES_BASE}/${file.path}`;
                            const sourceUrl = `https://github.com/${OWNER}/${REPO}/blob/${defaultBranch}/${file.path}`;
                            return `
                            <li class="hover:bg-blue-50/50 transition-colors flex items-center justify-between px-4 sm:px-5 py-3 group">
                                <div class="flex items-center gap-3 min-w-0">
                                    <i data-lucide="file-code-2" class="w-4 h-4 sm:w-5 sm:h-5 text-slate-400 group-hover:text-blue-500 flex-shrink-0"></i>
                                    <a href="${pagesUrl}" target="_blank" class="text-slate-600 sm:text-slate-700 text-sm sm:text-base font-medium truncate group-hover:text-blue-700 transition-colors" title="${file.name}">
                                        ${file.name}
                                    </a>
                                </div>
                                <div class="flex gap-1 sm:gap-2 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0 ml-4">
                                    <a href="${pagesUrl}" target="_blank" rel="noopener noreferrer" class="p-1.5 sm:p-2 text-blue-600 hover:bg-blue-100 rounded-lg flex items-center gap-1 bg-blue-50 sm:bg-transparent" title="開啟網頁">
                                        <i data-lucide="external-link" class="w-4 h-4"></i>
                                        <span class="text-xs sm:hidden font-medium">預覽</span>
                                    </a>
                                    <a href="${sourceUrl}" target="_blank" rel="noopener noreferrer" class="p-1.5 sm:p-2 text-slate-600 hover:bg-slate-200 rounded-lg flex items-center gap-1 bg-slate-100 sm:bg-transparent" title="查看 GitHub 程式碼">
                                        <i data-lucide="github" class="w-4 h-4"></i>
                                        <span class="text-xs sm:hidden font-medium">原始碼</span>
                                    </a>
                                </div>
                            </li>
                            `;
                        }).join('')}
                    </ul>
                </div>
                `;
            }).join('');
        }

        // 渲染預覽圖網格檢視 (重量級，含 iframe)
        function renderGridFiles(filesToRender) {
            gridContainer.innerHTML = filesToRender.map(file => {
                const pagesUrl = `${GITHUB_PAGES_BASE}/${file.path}`;
                const sourceUrl = `https://github.com/${OWNER}/${REPO}/blob/${defaultBranch}/${file.path}`;

                return `
                    <div class="bg-white rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm md:hover:shadow-xl transition-all duration-300 md:hover:-translate-y-1 hover:border-blue-300 flex flex-col overflow-hidden group isolate transform-gpu">
                        <div class="relative w-full aspect-video bg-slate-100 border-b border-slate-100 overflow-hidden transform-gpu" style="transform: translateZ(0);">
                            <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 bg-slate-50">
                                <i data-lucide="image" class="w-6 h-6 sm:w-8 sm:h-8 mb-1 sm:mb-2 opacity-30"></i>
                                <span class="text-[10px] sm:text-xs font-medium tracking-wide">預覽載入中...</span>
                            </div>
                            
                            <iframe 
                                src="${pagesUrl}" 
                                loading="lazy" 
                                scrolling="no"
                                sandbox="allow-scripts allow-same-origin"
                                class="absolute top-0 left-0 w-[400%] h-[400%] origin-top-left scale-[0.25] pointer-events-none opacity-0 transition-opacity duration-700 ease-in-out no-scrollbar transform-gpu backface-hidden" 
                                onload="this.classList.remove('opacity-0')"
                                tabindex="-1">
                            </iframe>
                            
                            <a href="${pagesUrl}" target="_blank" rel="noopener noreferrer" class="absolute inset-0 z-10 bg-slate-900/0 md:group-hover:bg-slate-900/20 transition-colors duration-300 flex items-center justify-center">
                                <div class="bg-white/95 text-slate-800 px-3 py-1.5 sm:px-5 sm:py-2.5 rounded-full font-bold shadow-lg opacity-0 md:group-hover:opacity-100 transition-all duration-300 transform md:translate-y-4 md:group-hover:translate-y-0 flex items-center gap-1.5 sm:gap-2 text-xs sm:text-base">
                                    <i data-lucide="eye" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                                    <span class="hidden sm:inline">檢視網頁</span>
                                    <span class="sm:hidden">檢視</span>
                                </div>
                            </a>
                        </div>

                        <div class="p-3 sm:p-5 flex flex-col flex-grow bg-white">
                            <div class="flex-1 min-w-0 mb-3 sm:mb-4">
                                <h3 class="text-sm sm:text-base font-bold text-slate-800 truncate" title="${file.name}">
                                    ${file.name}
                                </h3>
                                <p class="text-[10px] sm:text-xs text-slate-500 truncate mt-1 flex items-center gap-1 sm:gap-1.5" title="${file.directory}">
                                    <i data-lucide="folder-open" class="w-3 h-3 sm:w-3.5 sm:h-3.5 text-slate-400"></i>
                                    <span class="bg-slate-100 px-1.5 sm:px-2 py-0.5 rounded font-medium">${file.directory}</span>
                                </p>
                            </div>
                            
                            <div class="mt-auto flex gap-1.5 sm:gap-2">
                                <a href="${pagesUrl}" target="_blank" rel="noopener noreferrer" class="flex-1 flex justify-center items-center gap-1 sm:gap-1.5 py-1.5 sm:py-2 bg-blue-50 hover:bg-blue-600 hover:text-white text-blue-700 text-xs sm:text-sm font-semibold rounded-lg sm:rounded-xl transition-all border border-blue-100 hover:border-blue-600 shadow-sm hover:shadow-md">
                                    <i data-lucide="external-link" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                                    開啟
                                </a>
                                <a href="${sourceUrl}" target="_blank" rel="noopener noreferrer" class="flex-none flex items-center justify-center px-2 sm:px-3 bg-white text-slate-600 hover:text-slate-900 hover:bg-slate-100 border border-slate-200 rounded-lg sm:rounded-xl transition-all shadow-sm hover:shadow-md" title="查看 GitHub 程式碼">
                                    <i data-lucide="github" class="w-3.5 h-3.5 sm:w-4 sm:h-4"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 統一的過濾邏輯 (搜尋字串 + 資料夾選擇)
        function filterFiles() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedFolder = folderSelect.value;
            
            currentFiles = allFiles.filter(file => {
                const matchSearch = file.path.toLowerCase().includes(searchTerm);
                const matchFolder = selectedFolder === '' || file.directory === selectedFolder;
                return matchSearch && matchFolder;
            });
            
            renderCurrentView();
        }

        // 註冊搜尋與下拉選單監聽器
        searchInput.addEventListener('input', filterFiles);
        folderSelect.addEventListener('change', filterFiles);

        // 顯示狀態切換邏輯
        function showState(state) {
            loadingState.classList.add('hidden');
            errorState.classList.add('hidden');
            contentState.classList.add('hidden');

            if (state === 'loading') loadingState.classList.remove('hidden');
            if (state === 'error') errorState.classList.remove('hidden');
            if (state === 'content') contentState.classList.remove('hidden');
        }

        // 啟動程式
        fetchRepositoryData();
    </script>
</body>
</html>
