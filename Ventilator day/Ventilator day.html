<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呼吸器天數計算器 - 智能輸入版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 基礎變數 - 淺色模式 */
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #f8fafc;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --invasive-bg: #fee2e2;
            --invasive-text: #b91c1c;
            --non-invasive-bg: #dbeafe;
            --non-invasive-text: #1d4ed8;
            --result-bg: #eff6ff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --clear-btn-bg: #f1f5f9;
        }

        /* 深色模式變數 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --card-bg: #1e293b;
                --primary-color: #3b82f6;
                --primary-hover: #60a5fa;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --border-color: #334155;
                --input-bg: #0f172a;
                --danger-color: #f87171;
                --success-color: #34d399;
                --invasive-bg: rgba(239, 68, 68, 0.2);
                --invasive-text: #fca5a5;
                --non-invasive-bg: rgba(59, 130, 246, 0.2);
                --non-invasive-text: #93c5fd;
                --result-bg: rgba(59, 130, 246, 0.1);
                --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
                --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
                --clear-btn-bg: #334155;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', -apple-system, 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
            transition: background-color 0.3s ease;
        }

        .container { width: 100%; max-width: 850px; display: flex; flex-direction: column; gap: 1.5rem; }

        /* 頁籤設計 */
        .tabs-container { background-color: var(--card-bg); border-radius: 16px; padding: 0.5rem; display: flex; box-shadow: var(--shadow); margin-bottom: 0.5rem; }
        .tab-btn { flex: 1; padding: 0.75rem 1rem; border: none; background: transparent; border-radius: 12px; font-size: 1rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all 0.3s ease; }
        .tab-btn.active { background-color: var(--primary-color); color: white; box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3); }

        .view-section { display: none; animation: fadeIn 0.4s ease; }
        .view-section.active { display: flex; flex-direction: column; gap: 1.5rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card { background-color: var(--card-bg); border-radius: 20px; box-shadow: var(--shadow); padding: 1.5rem; transition: all 0.3s ease; }
        .card-center { max-width: 400px; margin: 0 auto; text-align: center; padding: 2.5rem 2rem; box-shadow: var(--shadow-lg); width: 100%; }

        /* Hybrid 輸入框設計 */
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        .input-group label, .form-group label { display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.6rem; margin-left: 0.25rem; }
        
        .datetime-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            background-color: var(--input-bg);
            transition: all 0.2s ease;
            overflow: hidden; /* 防止子元素溢出圓角 */
            width: 100%;
        }
        .datetime-wrapper:focus-within { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        /* 錯誤狀態的紅框與動畫 */
        .datetime-wrapper.has-error {
            border-color: var(--danger-color);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .field-error-msg {
            color: var(--danger-color);
            font-size: 0.75rem;
            margin-top: 0.4rem;
            margin-left: 0.25rem;
            display: none;
            font-weight: 500;
        }
        .datetime-wrapper.has-error + .field-error-msg {
            display: block;
        }

        .datetime-text {
            flex: 1;
            padding: 0.875rem 0.75rem;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            font-family: inherit;
            min-width: 0; /* 絕對防止 Flex 子元素撐爆父容器 */
        }

        .icon-container {
            position: relative;
            width: 45px;
            flex-shrink: 0; /* 防止被擠壓 */
            height: 100%;
            align-self: stretch;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--clear-btn-bg);
            border-left: 1px solid var(--border-color);
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s, background-color 0.2s;
        }
        .icon-container:hover { background-color: var(--border-color); color: var(--primary-color); }
        
        .datetime-native {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; /* 隱藏原生外觀，但保留點擊功能 */
            cursor: pointer;
        }

        .btn-clear { background: transparent; border: none; padding: 0.5rem; margin-right: 0.25rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); transition: all 0.2s; opacity: 0; visibility: hidden; }
        .btn-clear.visible { opacity: 1; visibility: visible; }
        .btn-clear:hover { background: var(--danger-color); color: white; transform: rotate(90deg); }

        /* 其他元件樣式 */
        header { margin-bottom: 2.5rem; }
        h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
        .subtitle { font-size: 0.875rem; color: var(--text-muted); }

        .simple-result { background-color: var(--result-bg); border-radius: 24px; padding: 2.25rem 1.5rem; margin-bottom: 1.5rem; display: none; opacity: 0; transform: translateY(10px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .simple-result.show { display: block; opacity: 1; transform: translateY(0); }
        .result-label { font-size: 0.8125rem; font-weight: 600; color: var(--primary-color); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .days-value { font-size: 4.5rem; font-weight: 800; color: var(--primary-color); line-height: 1; margin-bottom: 0.5rem; font-variant-numeric: tabular-nums; }
        .unit { font-size: 1.125rem; font-weight: 500; color: var(--text-muted); }

        .error-msg { color: var(--danger-color); font-size: 0.875rem; margin-bottom: 1.5rem; display: none; padding: 1rem; background: rgba(239, 68, 68, 0.1); border-radius: 12px; border-left: 4px solid var(--danger-color); text-align: left; }
        .info-footer { font-size: 0.75rem; color: var(--text-muted); line-height: 1.6; padding-top: 1.5rem; border-top: 1px solid var(--border-color); margin-top: 1rem; text-align: left; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .metric-card { background-color: var(--result-bg); border-radius: 16px; padding: 1.5rem; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .metric-card.success { background-color: rgba(16, 185, 129, 0.1); }
        .metric-title { font-size: 0.875rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem; }
        .metric-value-complex { font-size: 3rem; font-weight: 700; color: var(--primary-color); line-height: 1; font-variant-numeric: tabular-nums; }
        .metric-card.success .metric-value-complex { color: var(--success-color); }
        .metric-unit { font-size: 1rem; font-weight: 500; margin-left: 0.25rem; }

        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        h2 { font-size: 1.25rem; font-weight: 600; }
        .btn { padding: 0.6rem 1.2rem; border-radius: 10px; font-weight: 500; font-size: 0.875rem; cursor: pointer; transition: all 0.2s; border: none; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); transform: translateY(-1px); }

        .record-list { display: flex; flex-direction: column; gap: 1rem; }
        
        /* 防跑版的終極 Grid 設定：使用 minmax(0, 1fr) 嚴格控制不撐開版面 */
        .record-item { 
            display: grid; 
            grid-template-columns: 110px minmax(0, 1fr) minmax(0, 1fr) 40px; 
            gap: 1rem; 
            align-items: center; 
            padding: 1rem; 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            background-color: var(--card-bg); 
        }
        
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; min-width: 0; }
        
        select { width: 100%; padding: 0.875rem 1rem; border: 2px solid var(--border-color); border-radius: 14px; background-color: var(--input-bg); color: var(--text-main); font-family: inherit; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        select:focus { border-color: var(--primary-color); }
        select.type-select { font-weight: 600; }
        select.type-select[value="invasive"] { color: var(--invasive-text); }
        
        .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.5rem; border-radius: 8px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-icon:hover { background-color: rgba(239, 68, 68, 0.1); color: var(--danger-color); }
        .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.875rem; border: 2px dashed var(--border-color); border-radius: 12px; }

        /* 擴大響應式折行斷點至 768px (平板以下)，徹底解決螢幕過窄的擠壓跑版 */
        @media (max-width: 768px) {
            .record-item { grid-template-columns: 1fr; gap: 0.75rem; position: relative; }
            .delete-btn-container { position: absolute; top: 1rem; right: 1rem; }
            .dashboard { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 頁籤切換器 -->
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('simple')">簡易計算</button>
            <button class="tab-btn" onclick="switchTab('complex')">進階計算</button>
        </div>

        <!-- ==================== 簡易版視圖 ==================== -->
        <div id="view-simple" class="view-section active">
            <div class="card card-center">
                <header>
                    <h1>呼吸器天數計算</h1>
                    <p class="subtitle">單一日期簡易計算</p>
                </header>

                <div class="input-group">
                    <label>初始呼吸器日期</label>
                    <div class="datetime-wrapper">
                        <input 
                            type="text" 
                            id="simpleDateText"
                            class="datetime-text" 
                            placeholder="滿8碼自動執行 (例: 20260228)"
                            onblur="handleSimpleTextBlur(this)"
                            oninput="handleSimpleTextInput(this)"
                            onkeyup="if(event.key === 'Enter') this.blur();"
                        >
                        <button class="btn-clear" id="simpleClearBtn" title="清除內容">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                        <div class="icon-container" title="開啟日曆選單">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            <input 
                                type="date" 
                                id="simpleDateNative"
                                class="datetime-native" 
                                onchange="handleSimpleNativeChange(this)"
                            >
                        </div>
                    </div>
                    <!-- 簡易版的局部錯誤提示 -->
                    <div class="field-error-msg"></div>
                </div>

                <div id="simpleResultSection" class="simple-result">
                    <div class="result-label">呼吸器使用天數</div>
                    <div id="simpleDaysDisplay" class="days-value">0</div>
                    <div class="unit">Days Total</div>
                </div>

                <div class="info-footer" style="text-align: center;">
                    系統將依據「包含起始日」原則計算至今日。
                </div>
            </div>
        </div>

        <!-- ==================== 複雜版視圖 ==================== -->
        <div id="view-complex" class="view-section">
            <div class="dashboard">
                <div class="metric-card">
                    <div class="metric-title">今日呼吸器天數 (連貫病程)</div>
                    <div>
                        <span class="metric-value-complex" id="totalDays">0</span>
                        <span class="metric-unit">天</span>
                    </div>
                </div>
                <div class="metric-card success">
                    <div class="metric-title">脫離天數 (自最後結束日)</div>
                    <div>
                        <span class="metric-value-complex" id="weaningDays">0</span>
                        <span class="metric-unit">天</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="header-flex">
                    <h2>使用紀錄 (多段式)</h2>
                    <button class="btn btn-primary" onclick="addRecord()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        新增紀錄
                    </button>
                </div>

                <div id="recordList" class="record-list">
                    <!-- 動態生成 -->
                </div>

                <div class="info-footer">
                    <strong>💡 智能輸入秘訣：</strong><br>
                    • <strong>自動觸發：</strong> 直接打滿 8 碼數字 (例 <code>02281225</code>)，系統會<strong>自動 Enter 執行</strong>並轉換！<br>
                    • 也可點擊最右側的「日曆圖示」叫出系統選單操作。
                </div>
            </div>
        </div>

    </div>

    <script>
        /* ==============================================================
           共用日期解析與格式化引擎 (Smart Parse)
        ============================================================== */
        function parseCustomDate(str) {
            if (!str) return null;
            
            const cleanDigits = str.replace(/\D/g, '');
            
            // 1. 完整 12 碼 (例: 202602281225 -> 2026-02-28 12:25)
            if (cleanDigits.length === 12 && !str.includes('/') && !str.includes('-')) {
                const y = parseInt(cleanDigits.slice(0,4));
                const m = parseInt(cleanDigits.slice(4,6)) - 1;
                const d = parseInt(cleanDigits.slice(6,8));
                const h = parseInt(cleanDigits.slice(8,10));
                const min = parseInt(cleanDigits.slice(10,12));
                return new Date(y, m, d, h, min);
            }
            
            // 2. 8 碼 (需判斷是 YYYYMMDD 還是 MMDDHHmm)
            if (cleanDigits.length === 8 && !str.includes('/') && !str.includes('-') && !str.includes(':')) {
                const firstTwo = parseInt(cleanDigits.slice(0,2));
                if (firstTwo === 19 || firstTwo === 20) {
                    const y = parseInt(cleanDigits.slice(0,4));
                    const m = parseInt(cleanDigits.slice(4,6)) - 1;
                    const d = parseInt(cleanDigits.slice(6,8));
                    return new Date(y, m, d);
                } else {
                    const y = new Date().getFullYear();
                    const m = parseInt(cleanDigits.slice(0,2)) - 1;
                    const d = parseInt(cleanDigits.slice(2,4));
                    const h = parseInt(cleanDigits.slice(4,6));
                    const min = parseInt(cleanDigits.slice(6,8));
                    return new Date(y, m, d, h, min);
                }
            }

            // 3. 4 碼 (例: 0228 -> 今年 02-28 00:00)
            if (cleanDigits.length === 4 && !str.includes('/') && !str.includes('-')) {
                const y = new Date().getFullYear();
                const m = parseInt(cleanDigits.slice(0,2)) - 1;
                const d = parseInt(cleanDigits.slice(2,4));
                return new Date(y, m, d);
            }

            // 4. 標準解析
            const cleanStr = str.replace('T', ' ').replace(/-/g, '/');
            const dateObj = new Date(cleanStr);
            if (isNaN(dateObj.getTime())) return null;
            return dateObj;
        }

        function formatNiceDate(dateObj) {
            if (!dateObj || isNaN(dateObj.getTime())) return '';
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            const h = String(dateObj.getHours()).padStart(2, '0');
            const min = String(dateObj.getMinutes()).padStart(2, '0');
            return `${y}-${m}-${d} ${h}:${min}`;
        }

        function formatNiceDateOnly(dateObj) {
            if (!dateObj || isNaN(dateObj.getTime())) return '';
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function formatForNative(str, isTime) {
            if(!str) return '';
            const d = parseCustomDate(str);
            if(!d) return '';
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            if (isTime) {
                const h = String(d.getHours()).padStart(2, '0');
                const min = String(d.getMinutes()).padStart(2, '0');
                return `${y}-${m}-${day}T${h}:${min}`;
            }
            return `${y}-${m}-${day}`;
        }

        function getMidnightDate(dateObj) {
            const d = new Date(dateObj);
            d.setHours(0, 0, 0, 0);
            return d;
        }

        /* ==============================================================
           切換頁籤邏輯
        ============================================================== */
        function switchTab(viewId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.view-section').forEach(view => view.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
        }


        /* ==============================================================
           簡易版邏輯
        ============================================================== */
        const simpleDateText = document.getElementById('simpleDateText');
        const simpleDateNative = document.getElementById('simpleDateNative');
        const simpleClearBtn = document.getElementById('simpleClearBtn');
        const simpleResultSection = document.getElementById('simpleResultSection');
        const simpleDaysDisplay = document.getElementById('simpleDaysDisplay');

        // 設定簡易版原生選擇器的最大值為今日
        simpleDateNative.max = formatNiceDateOnly(new Date());

        // 自動觸發 Enter 效果 (簡易版)
        function handleSimpleTextInput(inputEl) {
            hideSimpleError(); // 打字修改時立即消除錯誤紅框
            const val = inputEl.value;
            // 只要打滿 8 碼純數字 (YYYYMMDD) 且沒摻雜其他符號，就自動 blur 觸發計算
            if (/^\d{8}$/.test(val)) {
                inputEl.blur();
            }
        }

        function handleSimpleTextBlur(inputEl) {
            const val = inputEl.value.trim();
            if (!val) { resetSimpleUI(); return; }
            
            const dateObj = parseCustomDate(val);
            if (dateObj) {
                const formatted = formatNiceDateOnly(dateObj);
                inputEl.value = formatted;
                simpleDateNative.value = formatted; 
                executeSimpleCalc(dateObj);
            } else {
                showSimpleError("請輸入有效的日期格式");
            }
        }

        function handleSimpleNativeChange(inputEl) {
            const val = inputEl.value;
            if (val) {
                const dateObj = parseCustomDate(val);
                simpleDateText.value = val;
                executeSimpleCalc(dateObj);
            } else {
                resetSimpleUI();
            }
        }

        function executeSimpleCalc(startDate) {
            simpleClearBtn.classList.add('visible');
            const today = getMidnightDate(new Date());
            const startMidnight = getMidnightDate(startDate);
            
            if (startMidnight > today) {
                showSimpleError("日期不可晚於今天");
                return;
            }
            hideSimpleError();
            
            const diffMs = today.getTime() - startMidnight.getTime();
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            simpleDaysDisplay.textContent = diffDays + 1;
            simpleResultSection.classList.add('show');
        }

        function resetSimpleUI() {
            simpleDateText.value = '';
            simpleDateNative.value = '';
            simpleClearBtn.classList.remove('visible');
            simpleResultSection.classList.remove('show');
            hideSimpleError();
        }

        function showSimpleError(msg) {
            const wrapper = document.querySelector('#view-simple .datetime-wrapper');
            const errorEl = wrapper.nextElementSibling;
            wrapper.classList.add('has-error');
            errorEl.textContent = "⚠️ " + msg;
            simpleResultSection.classList.remove('show');
        }

        function hideSimpleError() { 
            const wrapper = document.querySelector('#view-simple .datetime-wrapper');
            wrapper.classList.remove('has-error');
        }

        simpleClearBtn.addEventListener('click', resetSimpleUI);


        /* ==============================================================
           複雜版邏輯 (多筆輸入)
        ============================================================== */
        let complexRecords = [
            { id: 1, type: 'non-invasive', start: '2026-02-28 12:25', end: '2026-03-06 09:00' }
        ];

        const recordListEl = document.getElementById('recordList');
        const totalDaysEl = document.getElementById('totalDays');
        const weaningDaysEl = document.getElementById('weaningDays');

        // 局部錯誤顯示函數
        function showFieldError(wrapper, msg) {
            wrapper.classList.add('has-error');
            const errorEl = wrapper.nextElementSibling;
            if (errorEl && errorEl.classList.contains('field-error-msg')) {
                errorEl.textContent = msg;
            }
        }

        function hideFieldError(wrapper) {
            wrapper.classList.remove('has-error');
        }

        function generateId() { return Date.now() + Math.floor(Math.random() * 1000); }

        function addRecord() {
            complexRecords.unshift({ id: generateId(), type: 'invasive', start: '', end: '' });
            renderComplex();
        }

        function deleteRecord(id) {
            complexRecords = complexRecords.filter(r => r.id !== id);
            renderComplex();
        }

        function updateRecord(id, field, value) {
            const index = complexRecords.findIndex(r => r.id === id);
            if (index !== -1) {
                complexRecords[index][field] = value;
                calculateComplexDays(); 
            }
        }

        // 自動觸發 Enter 效果 (複雜版)
        function handleComplexTextInput(id, field, inputEl) {
            hideFieldError(inputEl.closest('.datetime-wrapper')); // 開始修改就解除紅框
            const val = inputEl.value;
            // 只要打滿 8 碼 (MMDDHHmm) 或 12 碼 (YYYYMMDDHHmm) 就自動 blur 觸發格式化與計算
            if (/^\d{8}$/.test(val) || /^\d{12}$/.test(val)) {
                inputEl.blur();
            }
        }

        function handleComplexTextBlur(id, field, inputEl) {
            const val = inputEl.value.trim();
            const wrapper = inputEl.closest('.datetime-wrapper');
            
            if (!val) {
                hideFieldError(wrapper);
                updateRecord(id, field, '');
                wrapper.querySelector('.datetime-native').value = '';
                return;
            }

            const dateObj = parseCustomDate(val);
            if (dateObj) {
                // 防呆：檢查是否為未來時間 (隔天以後)
                const todayMidnight = getMidnightDate(new Date());
                const inputMidnight = getMidnightDate(dateObj);
                if (inputMidnight > todayMidnight) {
                    showFieldError(wrapper, "⚠️ 時間不可晚於今天");
                    // 故意不清除欄位文字讓使用者方便修改，但「不寫入計算」以免結果出錯
                    updateRecord(id, field, '');
                    return;
                }

                hideFieldError(wrapper);
                const formatted = formatNiceDate(dateObj); 
                inputEl.value = formatted;
                
                wrapper.querySelector('.datetime-native').value = formatForNative(formatted, true);
                updateRecord(id, field, formatted);
            } else {
                showFieldError(wrapper, "⚠️ 無效的日期格式");
                updateRecord(id, field, '');
            }
        }

        function handleComplexNativeChange(id, field, inputEl) {
            const val = inputEl.value; 
            const wrapper = inputEl.closest('.datetime-wrapper');
            const textInput = wrapper.querySelector('.datetime-text');

            if (val) {
                const dateObj = new Date(val.replace('T', ' '));
                // 防呆：檢查是否為未來時間 (隔天以後)
                const todayMidnight = getMidnightDate(new Date());
                const inputMidnight = getMidnightDate(dateObj);
                
                if (inputMidnight > todayMidnight) {
                    showFieldError(wrapper, "⚠️ 時間不可晚於今天");
                    textInput.value = val.replace('T', ' '); // 顯示剛才選錯的時間
                    updateRecord(id, field, '');
                    return;
                }

                hideFieldError(wrapper);
                const formatted = val.replace('T', ' '); 
                textInput.value = formatted;
                updateRecord(id, field, formatted);
            } else {
                hideFieldError(wrapper);
                textInput.value = '';
                updateRecord(id, field, '');
            }
        }

        function calculateComplexDays() {
            const validRecords = complexRecords.filter(r => r.start);
            
            if (validRecords.length === 0) {
                totalDaysEl.textContent = '0';
                weaningDaysEl.textContent = '0';
                return;
            }

            const today = getMidnightDate(new Date());

            let earliestStartDate = null;
            let latestEndDate = null;
            let hasOngoing = false;

            validRecords.forEach(r => {
                const startD = getMidnightDate(parseCustomDate(r.start));
                if (startD) {
                    if (!earliestStartDate || startD < earliestStartDate) {
                        earliestStartDate = startD;
                    }
                }

                if (r.end) {
                    const endD = getMidnightDate(parseCustomDate(r.end));
                    if (endD) {
                        if (!latestEndDate || endD > latestEndDate) {
                            latestEndDate = endD;
                        }
                    }
                } else {
                    hasOngoing = true; 
                }
            });

            /* 計算今日呼吸器天數 */
            if (earliestStartDate) {
                let calcEndDate = hasOngoing ? today : (latestEndDate || today);
                if (calcEndDate < earliestStartDate) {
                    totalDaysEl.textContent = '0';
                } else {
                    const diffMs = calcEndDate.getTime() - earliestStartDate.getTime();
                    totalDaysEl.textContent = Math.floor(diffMs / (1000 * 60 * 60 * 24)) + 1;
                }
            } else {
                totalDaysEl.textContent = '0';
            }

            /* 計算脫離天數 */
            if (hasOngoing || !latestEndDate) {
                weaningDaysEl.textContent = '0';
            } else {
                if (latestEndDate > today) {
                    weaningDaysEl.textContent = '0';
                } else {
                    const diffMs = today.getTime() - latestEndDate.getTime();
                    weaningDaysEl.textContent = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                }
            }
        }

        function renderComplex() {
            const todayMax = formatNiceDateOnly(new Date()) + 'T23:59';

            if (complexRecords.length === 0) {
                recordListEl.innerHTML = `
                    <div class="empty-state">尚無呼吸器紀錄，請點擊上方「新增紀錄」按鈕。</div>
                `;
            } else {
                recordListEl.innerHTML = complexRecords.map(record => `
                    <div class="record-item">
                        <div class="form-group">
                            <label>類別</label>
                            <select 
                                class="type-select" 
                                style="color: ${record.type === 'invasive' ? 'var(--invasive-text)' : 'var(--non-invasive-text)'};"
                                onchange="updateRecord(${record.id}, 'type', this.value); renderComplex();"
                            >
                                <option value="invasive" ${record.type === 'invasive' ? 'selected' : ''}>侵襲性</option>
                                <option value="non-invasive" ${record.type === 'non-invasive' ? 'selected' : ''}>非侵襲性</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>使用時間 (起)</label>
                            <div class="datetime-wrapper">
                                <input 
                                    type="text" 
                                    class="datetime-text" 
                                    value="${record.start}"
                                    placeholder="滿8碼自動輸入 (例 02281225)"
                                    oninput="handleComplexTextInput(${record.id}, 'start', this)"
                                    onblur="handleComplexTextBlur(${record.id}, 'start', this)"
                                    onkeyup="if(event.key === 'Enter') this.blur();"
                                >
                                <div class="icon-container" title="開啟日曆">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                    <input 
                                        type="datetime-local" 
                                        class="datetime-native" 
                                        max="${todayMax}"
                                        value="${formatForNative(record.start, true)}"
                                        onchange="handleComplexNativeChange(${record.id}, 'start', this)"
                                    >
                                </div>
                            </div>
                            <div class="field-error-msg"></div>
                        </div>
                        <div class="form-group">
                            <label>結束時間 (迄)</label>
                            <div class="datetime-wrapper">
                                <input 
                                    type="text" 
                                    class="datetime-text" 
                                    value="${record.end}"
                                    placeholder="滿8碼自動輸入 (例 03060900)"
                                    oninput="handleComplexTextInput(${record.id}, 'end', this)"
                                    onblur="handleComplexTextBlur(${record.id}, 'end', this)"
                                    onkeyup="if(event.key === 'Enter') this.blur();"
                                >
                                <div class="icon-container" title="開啟日曆">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                    <input 
                                        type="datetime-local" 
                                        class="datetime-native" 
                                        max="${todayMax}"
                                        value="${formatForNative(record.end, true)}"
                                        onchange="handleComplexNativeChange(${record.id}, 'end', this)"
                                    >
                                </div>
                            </div>
                            <div class="field-error-msg"></div>
                        </div>
                        <div class="delete-btn-container">
                            <button class="btn-icon" onclick="deleteRecord(${record.id})" title="刪除此紀錄">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </div>
                    </div>
                `).join('');
            }
            calculateComplexDays();
        }

        // 初始渲染
        renderComplex();

    </script>
</body>
</html>
