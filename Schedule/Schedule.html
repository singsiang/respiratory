<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呼吸治療師排班系統 (國定假日智慧排休版)</title>
    <!-- 載入 React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 載入 Babel 以解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            main { padding: 0 !important; overflow: visible !important; }
            .print-break-inside-avoid { break-inside: avoid; }
            table { font-size: 10px; }
            th, td { padding: 2px !important; }
        }
        /* 自訂捲軸樣式 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 內建圖示組件 ---
        const Icon = ({ path, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );
        const Icons = {
            Calendar: <Icon path={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></>} />,
            Users: <Icon path={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></>} />,
            Settings: <Icon path={<><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></>} />,
            Alert: <Icon path={<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></>} />,
            Chart: <Icon path={<><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></>} />,
            Check: <Icon path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></>} />,
            X: <Icon path={<><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></>} />,
            Trash: <Icon path={<><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></>} />,
            Printer: <Icon path={<><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></>} />,
            Lock: <Icon path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></>} />,
            Info: <Icon path={<><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></>} />,
            Plus: <Icon path={<><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></>} />
        };

        // --- 國定假日預設值 ---
        const DEFAULT_HOLIDAYS = {
            '2025-12-25': '行憲紀念',
            '2026-01-01': '元旦',
            '2026-02-16': '除夕',
            '2026-02-17': '初一',
            '2026-02-18': '初二',
            '2026-02-19': '初三',
            '2026-02-20': '小年補假',
            '2026-02-27': '和平補假',
            '2026-04-03': '兒童補假',
            '2026-04-06': '清明補假',
            '2026-05-01': '勞動節',
            '2026-06-19': '端午節',
            '2026-09-25': '中秋節',
            '2026-09-28': '教師節',
            '2026-10-09': '國慶補假',
            '2026-10-26': '光復補假'
        };

        // --- 日期工具函數 ---
        const getDayOfWeek = (dateObj) => {
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            return days[dateObj.getDay()];
        };

        const getLocalDateStr = (dateObj) => {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const getDatesArray = (startDate, endDate, holidaysMap) => {
            const dates = [];
            let current = new Date(startDate);
            while (current <= endDate) {
                const dateStr = getLocalDateStr(current);
                dates.push({
                    date: dateStr,
                    dayOfWeek: getDayOfWeek(current),
                    isWeekend: current.getDay() === 0 || current.getDay() === 6,
                    isHoliday: !!holidaysMap[dateStr],
                    holidayName: holidaysMap[dateStr] || ''
                });
                current.setDate(current.getDate() + 1);
            }
            return dates;
        };

        // 取得「每月21號至下個月20號」
        const getMonthlyDates = (yearMonthStr, holidaysMap) => { 
            const [year, month] = yearMonthStr.split('-').map(Number);
            let prevMonth = month - 1;
            let prevYear = year;
            if (prevMonth === 0) {
                prevMonth = 12;
                prevYear -= 1;
            }
            return getDatesArray(new Date(prevYear, prevMonth - 1, 21), new Date(year, month - 1, 20), holidaysMap);
        };

        // 取得「嚴格28天四週」
        const getFourWeekDates = (startStr, holidaysMap) => { 
            const [year, month, day] = startStr.split('-').map(Number);
            const startDate = new Date(year, month - 1, day);
            const endDate = new Date(startDate);
            endDate.setDate(endDate.getDate() + 27);
            return getDatesArray(startDate, endDate, holidaysMap);
        };

        // --- 預設資料 ---
        const defaultSettings = {
            monthlyPeriod: '2026-01',     
            fourWeekStart: '2025-12-22',  
            hours: { D: 8, E: 8, N: 8 },
            minManpower: {
                weekday: { D: 10, E: 5, N: 3 },
                weekend: { D: 8, E: 5, N: 3 }
            }
        };

        // 自動生成 26 位預設治療師名單
        const initialStaff = Array.from({ length: 26 }, (_, i) => ({
            id: i + 1,
            name: `治療師${String(i + 1).padStart(2, '0')}`,
            pureDayShift: false,
            isIDS: false, 
            minE: 7, 
            minN: 5,
            customOff: '' // 空白代表交由系統智慧計算應休天數
        }));
        
        initialStaff[0].isIDS = true; 
        initialStaff[1].isIDS = true;

        initialStaff[3].pureDayShift = true; 
        initialStaff[3].minE = 0;
        initialStaff[3].minN = 0;

        const SHIFT_COLORS = {
            '': 'bg-gray-50',
            'D': 'bg-blue-100 text-blue-800 font-bold',
            'E': 'bg-orange-100 text-orange-800 font-bold',
            'N': 'bg-purple-100 text-purple-800 font-bold',
            'X': 'bg-red-100 text-red-800 font-bold', 
            'O': 'bg-green-100 text-green-800 font-bold', 
        };

        function App() {
            const [activeTab, setActiveTab] = useState('schedule');
            const [viewMode, setViewMode] = useState('monthly'); 
            const [paintBrush, setPaintBrush] = useState('D');
            const [isReservationMode, setIsReservationMode] = useState(false); 

            // 新增假日的表單狀態
            const [newHolDate, setNewHolDate] = useState('');
            const [newHolName, setNewHolName] = useState('');
            const [importText, setImportText] = useState('');      // 新增：智慧匯入的文字框狀態
            const [importStatus, setImportStatus] = useState('');  // 新增：匯入成功/失敗的提示狀態

            // --- Local Storage 機制 (升級 v12 且相容舊版資料) ---
            const loadData = (key, defaultVal, fallbackKey = null) => {
                try {
                    const saved = localStorage.getItem(key);
                    if (saved) return JSON.parse(saved);
                    if (fallbackKey) {
                        const fallback = localStorage.getItem(fallbackKey);
                        if (fallback) return JSON.parse(fallback);
                    }
                    return defaultVal;
                } catch (e) {
                    return defaultVal;
                }
            };

            const [settings, setSettings] = useState(() => loadData('rt_settings_v12', defaultSettings, 'rt_settings_v11'));
            const [staffList, setStaffList] = useState(() => loadData('rt_staff_v12', initialStaff, 'rt_staff_v11'));
            const [schedule, setSchedule] = useState(() => loadData('rt_schedule_v12', {}, 'rt_schedule_v11'));
            const [lockedCells, setLockedCells] = useState(() => loadData('rt_locked_v12', {}, 'rt_locked_v11'));
            const [customHolidays, setCustomHolidays] = useState(() => loadData('rt_holidays_v12', DEFAULT_HOLIDAYS));

            useEffect(() => localStorage.setItem('rt_settings_v12', JSON.stringify(settings)), [settings]);
            useEffect(() => localStorage.setItem('rt_staff_v12', JSON.stringify(staffList)), [staffList]);
            useEffect(() => localStorage.setItem('rt_schedule_v12', JSON.stringify(schedule)), [schedule]);
            useEffect(() => localStorage.setItem('rt_locked_v12', JSON.stringify(lockedCells)), [lockedCells]);
            useEffect(() => localStorage.setItem('rt_holidays_v12', JSON.stringify(customHolidays)), [customHolidays]);

            // 動態產生日期陣列 (帶入自訂假日)
            const dates = useMemo(() => {
                if (viewMode === 'monthly') {
                    return getMonthlyDates(settings.monthlyPeriod, customHolidays);
                } else {
                    return getFourWeekDates(settings.fourWeekStart, customHolidays);
                }
            }, [viewMode, settings.monthlyPeriod, settings.fourWeekStart, customHolidays]);

            // 計算本期智慧基本應休天數
            const baseOffDays = useMemo(() => {
                return dates.filter(d => d.isWeekend || d.isHoliday).length;
            }, [dates]);

            // 新增：自動產生連續的四週週期選單 (以 2025-12-22 為第一期基準)
            const fourWeekCycles = useMemo(() => {
                const base = new Date('2025-12-22');
                const options = [];
                // 產生 20 個週期，涵蓋 2026 全年與 2027 年初
                for (let i = 0; i <= 20; i++) { 
                    const start = new Date(base);
                    start.setDate(start.getDate() + i * 28);
                    const end = new Date(start);
                    end.setDate(end.getDate() + 27);
                    
                    options.push({
                        val: getLocalDateStr(start),
                        label: `第${i+1}期 (${getLocalDateStr(start).slice(5).replace('-','/')} ~ ${getLocalDateStr(end).slice(5).replace('-','/')})`
                    });
                }
                return options;
            }, []);

            // 新增：如果舊紀錄的起始日(如 12/15) 不在標準週期內，自動強制修正回 12/22
            useEffect(() => {
                if (viewMode === 'fourWeek' && !fourWeekCycles.find(c => c.val === settings.fourWeekStart)) {
                    setSettings(prev => ({ ...prev, fourWeekStart: '2025-12-22' }));
                }
            }, [viewMode, settings.fourWeekStart, fourWeekCycles]);

            // --- 班表操作 ---
            const handleCellClick = (staffId, dateStr) => {
                const isLocked = lockedCells[staffId]?.[dateStr];
                if (!isReservationMode && isLocked) return;

                setSchedule(prev => {
                    const newSchedule = { ...prev };
                    if (!newSchedule[staffId]) newSchedule[staffId] = {};
                    const currentShift = newSchedule[staffId][dateStr] || '';
                    const nextShift = currentShift === paintBrush ? '' : paintBrush;
                    newSchedule[staffId][dateStr] = nextShift;
                    
                    if (isReservationMode) {
                        setLockedCells(lockPrev => {
                            const newLocked = { ...lockPrev };
                            if (!newLocked[staffId]) newLocked[staffId] = {};
                            newLocked[staffId][dateStr] = nextShift !== ''; 
                            return newLocked;
                        });
                    }
                    return newSchedule;
                });
            };

            const clearRow = (staffId) => {
                const msg = isReservationMode 
                    ? '確定要清空此人「包含預約班」的所有班表嗎？' 
                    : '確定要清空此人「未鎖定」的排班嗎？(預約好的假不會被清掉)';

                if (window.confirm(msg)) {
                    setSchedule(prev => {
                        const newSchedule = { ...prev };
                        if (!newSchedule[staffId]) return newSchedule;
                        dates.forEach(d => {
                            if (isReservationMode || !lockedCells[staffId]?.[d.date]) {
                                newSchedule[staffId][d.date] = '';
                            }
                        });
                        return newSchedule;
                    });

                    if (isReservationMode) {
                        setLockedCells(prev => {
                            const newLocked = { ...prev };
                            if (newLocked[staffId]) {
                                dates.forEach(d => {
                                    newLocked[staffId][d.date] = false;
                                });
                            }
                            return newLocked;
                        });
                    }
                }
            };

            const resetAllData = () => {
                if (window.confirm('警告：這將會清除所有您排好的班表與設定，恢復成預設值！確定嗎？')) {
                    localStorage.removeItem('rt_settings_v12');
                    localStorage.removeItem('rt_staff_v12');
                    localStorage.removeItem('rt_schedule_v12');
                    localStorage.removeItem('rt_locked_v12');
                    localStorage.removeItem('rt_holidays_v12');
                    window.location.reload();
                }
            };

            const addHoliday = () => {
                if (newHolDate && newHolName) {
                    setCustomHolidays(prev => ({ ...prev, [newHolDate]: newHolName }));
                    setNewHolDate('');
                    setNewHolName('');
                }
            };

            const removeHoliday = (dateKey) => {
                if(window.confirm(`確定要刪除 ${dateKey} 假日設定嗎？`)) {
                    setCustomHolidays(prev => {
                        const copy = { ...prev };
                        delete copy[dateKey];
                        return copy;
                    });
                }
            };

            // 新增：智慧解析國定假日文字的引擎
            const handleSmartImport = () => {
                if (!importText.trim()) return;

                const baseYearStr = settings.fourWeekStart.substring(0, 4);
                const baseYear = parseInt(baseYearStr, 10);
                const newHolidays = {};
                let count = 0;

                // 先解析「挪移與調整休假」，例如：02/15(日)小年夜02/20(五)休假
                const shiftRegex = /\d{2}\/\d{2}\([一二三四五六日]\)(.+?)(\d{2})\/(\d{2})\([一二三四五六日]\)休假/g;
                let match;
                let remainingText = importText;
                
                while ((match = shiftRegex.exec(importText)) !== null) {
                    const name = match[1].trim(); // 取得名稱(如小年夜)
                    const month = match[2];       // 取得補假月份(02)
                    const day = match[3];         // 取得補假日期(20)
                    // 假設 11 月、12 月屬於排班起始年度 (如2025)，其餘為隔年 (如2026)
                    const year = parseInt(month, 10) >= 11 ? baseYear : baseYear + 1; 
                    const dateStr = `${year}-${month}-${day}`;
                    newHolidays[dateStr] = name + '(補)';
                    remainingText = remainingText.replace(match[0], ''); // 替換掉已解析的部分，避免重複
                    count++;
                }

                // 再解析「一般國定假日」，例如：12/25(四)行憲紀念日、
                const normalRegex = /(\d{2})\/(\d{2})\([一二三四五六日]\)([^、，。：；\s]+)/g;
                while ((match = normalRegex.exec(remainingText)) !== null) {
                    const month = match[1];
                    const day = match[2];
                    const name = match[3].trim();
                    const year = parseInt(month, 10) >= 11 ? baseYear : baseYear + 1;
                    const dateStr = `${year}-${month}-${day}`;
                    newHolidays[dateStr] = name;
                    count++;
                }

                if (count > 0) {
                    setCustomHolidays(prev => ({ ...prev, ...newHolidays }));
                    setImportText('');
                    setImportStatus(`✅ 成功解析並匯入 ${count} 筆假日！`);
                    setTimeout(() => setImportStatus(''), 4000);
                } else {
                    setImportStatus('❌ 無法解析，請確認文字是否包含「MM/DD(W)節日」格式');
                    setTimeout(() => setImportStatus(''), 4000);
                }
            };

            // --- 核心運算：違規檢查 ---
            const analyzeSchedule = useMemo(() => {
                const analysis = {};
                
                // 1. IDS 同時放假檢核
                const idsStaffIds = staffList.filter(s => s.isIDS).map(s => s.id);
                const sharedIdsViolations = [];
                
                if (idsStaffIds.length > 1) {
                    dates.forEach(d => {
                        let workingCount = 0;
                        let explicitLeaveCount = 0;
                        idsStaffIds.forEach(id => {
                            const s = schedule[id]?.[d.date] || '';
                            if (['D', 'E', 'N'].includes(s)) workingCount++;
                            if (['X', 'O'].includes(s)) explicitLeaveCount++;
                        });
                        if (workingCount === 0 && explicitLeaveCount > 0) {
                            sharedIdsViolations.push(`${d.date.slice(5).replace('-','/')} IDS個管師同時放假/無班`);
                        }
                    });
                }

                staffList.forEach(staff => {
                    let countD = 0, countE = 0, countN = 0, countX = 0, countO = 0;
                    let maxContinuous = 0, currentContinuous = 0;
                    let xIndices = []; 
                    let violations = [];

                    for (let i = 0; i < dates.length; i++) {
                        const dateStr = dates[i].date;
                        const s = schedule[staff.id]?.[dateStr] || '';
                        
                        if (s === 'D') countD++;
                        if (s === 'E') countE++;
                        if (s === 'N') countN++;
                        if (s === 'X') {
                            countX++;
                            xIndices.push(i);
                        }
                        if (s === 'O') countO++;

                        if (['D', 'E', 'N'].includes(s)) {
                            currentContinuous++;
                            if (currentContinuous > maxContinuous) maxContinuous = currentContinuous;
                        } else {
                            currentContinuous = 0;
                        }

                        if (i < dates.length - 1) {
                            const nextDateStr = dates[i + 1].date;
                            const nextS = schedule[staff.id]?.[nextDateStr] || '';
                            if (s === 'N' && (nextS === 'D' || nextS === 'E')) {
                                violations.push(`${dateStr.slice(5)} 大夜接 ${nextDateStr.slice(5)} ${nextS === 'D' ? '白班' : '小夜'} (間隔不足11h)`);
                            }
                            if (s === 'E' && nextS === 'D') {
                                violations.push(`${dateStr.slice(5)} 小夜接 ${nextDateStr.slice(5)} 白班 (間隔不足11h)`);
                            }
                        }
                    }

                    const totalHours = (countD * settings.hours.D) + (countE * settings.hours.E) + (countN * settings.hours.N);

                    if (totalHours > 160 && viewMode === 'fourWeek') violations.push(`四週總工時超標 (${totalHours} > 160h)`);
                    if (maxContinuous > 12) violations.push(`連續上班天數超標 (${maxContinuous} > 12天)`);
                    
                    if (!staff.pureDayShift) {
                        if (countE < staff.minE) violations.push(`小夜班數不足 (${countE} < ${staff.minE}天)`);
                        if (countN < staff.minN) violations.push(`大夜班數不足 (${countN} < ${staff.minN}天)`);
                    }

                    // 智慧休假檢核：如果個人沒有指定天數，就採用系統計算的 baseOffDays
                    const targetOff = (typeof staff.customOff === 'number' && staff.customOff !== '') ? staff.customOff : baseOffDays;
                    if ((countX + countO) < targetOff) {
                        violations.push(`休假天數不足 (${countX + countO} < ${targetOff}天)`);
                    }

                    if (staff.isIDS && sharedIdsViolations.length > 0) {
                        violations.push(...sharedIdsViolations);
                    }

                    if (viewMode === 'fourWeek') {
                        if (countX < 4) violations.push(`四週內例假日(W7)不足 (${countX} < 4天)`);
                        if (countO < 4) violations.push(`四週內休息日(W6)不足 (${countO} < 4天)`);

                        if (xIndices.length === 0) {
                            violations.push(`未排任何例假日(X)`);
                        } else {

                                                    <tr>
                                                        <th className="px-4 py-2 text-left text-sm font-semibold">姓名</th>
                                                        <th className="px-4 py-2 text-center text-sm font-semibold w-24">純白班</th>
                                                        <th className="px-4 py-2 text-center text-sm font-semibold w-28">
                                                            IDS個管師
                                                            <div className="text-[10px] text-red-500 font-normal mt-0.5">不能同時放假</div>
                                                        </th>
                                                        <th className="px-4 py-2 text-center text-sm font-semibold w-28">小夜班至少 (天)</th>
                                                        <th className="px-4 py-2 text-center text-sm font-semibold w-28">大夜班至少 (天)</th>
                                                        <th className="px-4 py-2 text-center text-sm font-semibold w-28">
                                                            指定應休(天)
                                                            <div className="text-[10px] text-gray-500 font-normal mt-0.5">留白則由系統計算</div>
                                                        </th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-200">
                                                    {staffList.map((staff, idx) => (
                                                        <tr key={staff.id}>
                                                            <td className="px-4 py-2">
                                                                <input type="text" value={staff.name} 
                                                                    onChange={e => {
                                                                        const newList = [...staffList];
                                                                        newList[idx].name = e.target.value;
                                                                        setStaffList(newList);
                                                                    }} className="w-full border-gray-300 rounded px-2 py-1 bg-gray-50 hover:bg-white focus:bg-white"/>
                                                            </td>
                                                            <td className="px-4 py-2 text-center">
                                                                <input type="checkbox" checked={staff.pureDayShift || false}
                                                                    onChange={e => {
                                                                        const newList = [...staffList];
                                                                        const isPure = e.target.checked;
                                                                        newList[idx].pureDayShift = isPure;
                                                                        if (isPure) {
                                                                            newList[idx].minE = 0;
                                                                            newList[idx].minN = 0;
                                                                        }
                                                                        setStaffList(newList);
                                                                    }} className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer"/>
                                                            </td>
                                                            <td className="px-4 py-2 text-center">
                                                                <input type="checkbox" checked={staff.isIDS || false}
                                                                    onChange={e => {
                                                                        const newList = [...staffList];
                                                                        newList[idx].isIDS = e.target.checked;
                                                                        setStaffList(newList);
                                                                    }} className="w-4 h-4 text-purple-600 rounded border-gray-300 focus:ring-purple-500 cursor-pointer"/>
                                                            </td>
                                                            <td className="px-4 py-2 text-center">
                                                                <input type="number" value={staff.minE} disabled={staff.pureDayShift}
                                                                    onChange={e => {
                                                                        const newList = [...staffList];
                                                                        newList[idx].minE = Number(e.target.value);
                                                                        setStaffList(newList);
                                                                    }} className={`w-full border-gray-300 rounded px-2 py-1 text-center ${staff.pureDayShift ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gray-50 hover:bg-white'}`}/>
                                                            </td>
                                                            <td className="px-4 py-2 text-center">
                                                                <input type="number" value={staff.minN} disabled={staff.pureDayShift}
                                                                    onChange={e => {
                                                                        const newList = [...staffList];
                                                                        newList[idx].minN = Number(e.target.value);
                                                                        setStaffList(newList);
                                                                    }} className={`w-full border-gray-300 rounded px-2 py-1 text-center ${staff.pureDayShift ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gray-50 hover:bg-white'}`}/>
                                                            </td>
                                                            <td className="px-4 py-2 text-center relative">
                                                                <input type="number" value={staff.customOff === undefined ? '' : staff.customOff} placeholder={String(baseOffDays)}
                                                                    onChange={e => {
                                                                        const newList = [...staffList];
                                                                        newList[idx].customOff = e.target.value ? Number(e.target.value) : '';
                                                                        setStaffList(newList);
                                                                    }} className="w-full border-gray-300 rounded px-2 py-1 text-center bg-blue-50/50 hover:bg-white focus:bg-white placeholder-gray-400 font-bold text-blue-800"/>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </>
                                ) : (
                                    <div className="space-y-8">
                                        <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">系統參數設定</h2>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                                <h3 className="font-bold text-gray-700 mb-3 border-b pb-2">班次工時定義</h3>
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="text-sm">白班 / 小夜</span>
                                                    <div className="text-sm text-gray-500">預設 8 小時</div>
                                                </div>
                                                <div className="flex justify-between items-center">
                                                    <span className="text-sm font-medium">大夜班工時</span>
                                                    <input type="number" value={settings.hours.N} 
                                                        onChange={e => setSettings({...settings, hours: {...settings.hours, N: Number(e.target.value)}})}
                                                        className="w-20 border border-gray-300 rounded px-2 py-1 text-center"/>
                                                </div>
                                            </div>

                                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                                <h3 className="font-bold text-gray-700 mb-3 border-b pb-2">每日最低人力需求</h3>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <h4 className="text-sm font-bold text-gray-600 mb-2 text-center">平日</h4>
                                                        <div className="space-y-2">
                                                            {['D', 'E', 'N'].map(shift => (
                                                                <div key={`wd-${shift}`} className="flex justify-between items-center">
                                                                    <span className="text-sm">{shift === 'D' ? '白班' : shift === 'E' ? '小夜' : '大夜'}</span>
                                                                    <input type="number" value={settings.minManpower.weekday[shift]} min="0"
                                                                        onChange={e => setSettings({...settings, minManpower: {...settings.minManpower, weekday: {...settings.minManpower.weekday, [shift]: Number(e.target.value)}}})}
                                                                        className="w-12 border border-gray-300 rounded px-1 py-1 text-center text-sm" />
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <h4 className="text-sm font-bold text-rose-600 mb-2 text-center">假日 (含週末及國定假日)</h4>
                                                        <div className="space-y-2">
                                                            {['D', 'E', 'N'].map(shift => (
                                                                <div key={`we-${shift}`} className="flex justify-between items-center">
                                                                    <span className="text-sm">{shift === 'D' ? '白班' : shift === 'E' ? '小夜' : '大夜'}</span>
                                                                    <input type="number" value={settings.minManpower.weekend[shift]} min="0"
                                                                        onChange={e => setSettings({...settings, minManpower: {...settings.minManpower, weekend: {...settings.minManpower.weekend, [shift]: Number(e.target.value)}}})}
                                                                        className="w-12 border border-gray-300 rounded px-1 py-1 text-center text-sm" />
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* 新增的自訂國定假日區塊 */}
                                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200 col-span-1 md:col-span-2">
                                                <h3 className="font-bold text-gray-700 mb-3 border-b pb-2">自訂國定假日與調整放假</h3>
                                                
                                                {/* 智慧匯入區塊 */}
                                                <div className="mb-6 p-4 bg-blue-50 border border-blue-200 rounded-lg">
                                                    <h4 className="font-bold text-blue-800 mb-2 flex items-center gap-1">
                                                        <span className="scale-75">{Icons.Info}</span> 智慧文字解析匯入
                                                    </h4>
                                                    <p className="text-xs text-blue-600 mb-2">
                                                        請直接貼上排班公告文字（支援「MM/DD(W)節日」或「...挪移...MM/DD(W)休假」格式），系統會自動抓取日期。
                                                    </p>
                                                    <textarea
                                                        value={importText}
                                                        onChange={(e) => setImportText(e.target.value)}
                                                        placeholder="貼上文字，例如：(1)原國定假日之日期休假，計 10 天：12/25(四)行憲紀念日... (2)國定假日逢週六、日之挪移... 02/15(日)小年夜02/20(五)休假..."
                                                        className="w-full border border-blue-300 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none mb-3 h-20 resize-y bg-white text-gray-700"
                                                    ></textarea>
                                                    <div className="flex items-center gap-3">
                                                        <button
                                                            onClick={handleSmartImport}
                                                            className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors"
                                                        >
                                                            自動解析與匯入
                                                        </button>
                                                        {importStatus && (
                                                            <span className={`text-sm font-medium ${importStatus.includes('成功') ? 'text-green-600' : 'text-red-600'}`}>
                                                                {importStatus}
                                                            </span>
                                                        )}
                                                    </div>
                                                </div>

                                                <div className="flex flex-col sm:flex-row gap-2 mb-4">
                                                    <input type="date" value={newHolDate} onChange={e => setNewHolDate(e.target.value)} 
                                                        className="border border-gray-300 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none flex-1 sm:flex-none" />
                                                    <input type="text" placeholder="輸入假日名稱 (如：春假補假)" value={newHolName} onChange={e => setNewHolName(e.target.value)} 
                                                        className="border border-gray-300 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none flex-1" />
                                                    <button onClick={addHoliday} disabled={!newHolDate || !newHolName}
                                                        className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 disabled:bg-blue-300 flex items-center justify-center gap-1">
                                                        <span className="scale-75">{Icons.Plus}</span> 新增
                                                    </button>
                                                </div>

                                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 max-h-60 overflow-y-auto pr-2">
                                                    {Object.entries(customHolidays).sort(([a], [b]) => a.localeCompare(b)).map(([date, name]) => (
                                                        <div key={date} className="flex justify-between items-center bg-white border border-gray-200 shadow-sm rounded-lg p-2.5 text-sm">
                                                            <div className="flex flex-col">
                                                                <span className="font-bold text-rose-600 text-xs">{date.replace(/-/g, '/')}</span>
                                                                <span className="text-gray-800 font-medium truncate max-w-[120px]" title={name}>{name}</span>
                                                            </div>
                                                            <button onClick={() => removeHoliday(date)} className="text-gray-400 hover:text-red-500 p-1.5 hover:bg-red-50 rounded-md transition-colors" title="刪除此假日">
                                                                {Icons.Trash}
                                                            </button>
                                                        </div>
                                                    ))}
                                                    {Object.keys(customHolidays).length === 0 && (
                                                        <div className="col-span-full text-center text-gray-500 py-4">目前沒有設定任何國定假日</div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mt-10 p-4 bg-red-50 border border-red-200 rounded-lg">
                                            <h3 className="font-bold text-red-800 mb-2">系統還原</h3>
                                            <p className="text-sm text-red-600 mb-4">這會清除本機瀏覽器中的所有排班資料並恢復預設設定。</p>
                                            <button onClick={resetAllData} className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                                                清除所有資料並重置
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
