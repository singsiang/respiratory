<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呼吸道藥物階層式衛教檢索</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f1f5f9;
        }

        /* 主標籤樣式 */
        .main-tab {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .main-tab.active {
            background-color: #1e293b;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* 次標籤樣式 */
        .sub-tab {
            transition: all 0.2s ease;
        }
        .sub-tab.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        /* 劑型分類標籤樣式 */
        .shape-tab {
            transition: all 0.2s ease;
        }
        .shape-tab.active {
            background-color: #8b5cf6; 
            color: white;
            border-color: #8b5cf6;
        }

        /* 藥物卡片懸停 */
        .med-card {
            transition: all 0.3s ease;
        }
        @media (min-width: 768px) {
            .med-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1);
            }
        }

        /* 藥理分類配色 (左側邊條) */
        .border-laba-ics { border-left: 4px solid #818cf8; }
        .border-laba-lama { border-left: 4px solid #10b981; }
        .border-lama { border-left: 4px solid #06b6d4; }
        .border-triple { border-left: 4px solid #f43f5e; }
        .border-saba { border-left: 4px solid #f59e0b; }
        .border-ics { border-left: 4px solid #f472b6; }
        .border-others { border-left: 4px solid #94a3b8; }

        /* 隱藏滾動條但保留功能 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="p-2 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- 標題 -->
        <header class="mb-5 md:mb-8 text-center">
            <h1 class="text-2xl md:text-4xl font-black text-slate-800 mb-1">呼吸道吸入劑與鼻噴劑檢索</h1>
            <p class="text-slate-500 text-sm md:text-base font-medium">裝置類型 ‧ 藥理分類 ‧ 劑型圖示檢索</p>
        </header>

        <!-- 第一層：主標籤 (裝置類型) -->
        <div class="mb-4 md:mb-6">
            <p class="text-[9px] md:text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 text-center">Step 1. 選擇裝置類型</p>
            <div class="flex flex-nowrap md:flex-wrap justify-start md:justify-center gap-2 overflow-x-auto pb-2 hide-scrollbar px-2" id="mainTabs">
                <button class="main-tab active px-5 md:px-8 py-2 md:py-3 rounded-xl md:rounded-2xl font-black text-sm md:text-lg bg-white text-slate-600 shadow-sm border border-slate-200 flex-shrink-0" data-main="all">全部</button>
                <button class="main-tab px-5 md:px-8 py-2 md:py-3 rounded-xl md:rounded-2xl font-black text-sm md:text-lg bg-white text-slate-600 shadow-sm border border-slate-200 flex-shrink-0" data-main="smi">SMI</button>
                <button class="main-tab px-5 md:px-8 py-2 md:py-3 rounded-xl md:rounded-2xl font-black text-sm md:text-lg bg-white text-slate-600 shadow-sm border border-slate-200 flex-shrink-0" data-main="dpi">DPI</button>
                <button class="main-tab px-5 md:px-8 py-2 md:py-3 rounded-xl md:rounded-2xl font-black text-sm md:text-lg bg-white text-slate-600 shadow-sm border border-slate-200 flex-shrink-0" data-main="mdi">MDI</button>
                <button class="main-tab px-5 md:px-8 py-2 md:py-3 rounded-xl md:rounded-2xl font-black text-sm md:text-lg bg-white text-slate-600 shadow-sm border border-slate-200 flex-shrink-0" data-main="nasal">鼻噴劑</button>
            </div>
        </div>

        <!-- 第二層：次標籤 (藥理分類) -->
        <div class="mb-4 md:mb-6">
            <p class="text-[9px] md:text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 text-center">Step 2. 選擇藥理主分類</p>
            <div class="flex flex-nowrap md:flex-wrap justify-start md:justify-center gap-1.5 overflow-x-auto pb-2 hide-scrollbar px-2" id="subTabs">
                <button class="sub-tab active px-3 py-1.5 rounded-full text-[11px] md:text-xs font-bold border border-slate-300 text-slate-500 flex-shrink-0" data-sub="all">不限藥理</button>
                <button class="sub-tab px-3 py-1.5 rounded-full text-[11px] md:text-xs font-bold border border-slate-300 text-slate-500 flex-shrink-0" data-sub="LABA+ICS">LABA+ICS</button>
                <button class="sub-tab px-3 py-1.5 rounded-full text-[11px] md:text-xs font-bold border border-slate-300 text-slate-500 flex-shrink-0" data-sub="LABA+LAMA">LABA+LAMA</button>
                <button class="sub-tab px-3 py-1.5 rounded-full text-[11px] md:text-xs font-bold border border-slate-300 text-slate-500 flex-shrink-0" data-sub="LAMA">LAMA</button>
                <button class="sub-tab px-3 py-1.5 rounded-full text-[11px] md:text-xs font-bold border border-slate-300 text-slate-500 flex-shrink-0" data-sub="Triple">三合一</button>
                <button class="sub-tab px-3 py-1.5 rounded-full text-[11px] md:text-xs font-bold border border-slate-300 text-slate-500 flex-shrink-0" data-sub="SABA">SABA (急救)</button>
                <button class="sub-tab px-3 py-1.5 rounded-full text-[11px] md:text-xs font-bold border border-slate-300 text-slate-500 flex-shrink-0" data-sub="ICS">ICS (類固醇)</button>
                <button class="sub-tab px-3 py-1.5 rounded-full text-[11px] md:text-xs font-bold border border-slate-300 text-slate-500 flex-shrink-0" data-sub="Others">其他 (鼻噴等)</button>
            </div>
        </div>

        <!-- 第三層：動態細部分類 (劑型外觀) -->
        <div class="mb-6 md:mb-10">
            <p class="text-[9px] md:text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 text-center">Step 3. 選擇劑型外觀</p>
            <div class="flex flex-nowrap md:flex-wrap justify-start md:justify-center gap-2 overflow-x-auto pb-2 hide-scrollbar px-2" id="shapeTabs">
                <!-- 由 JavaScript 動態生成 (含圖示) -->
            </div>
        </div>

        <!-- 搜尋與動態下拉選單 -->
        <div class="max-w-2xl mx-auto mb-6 md:mb-10 px-2 space-y-3">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="手動搜尋藥名或成分..." 
                       class="w-full pl-10 pr-4 py-3 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-base">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-300">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
            </div>
            
            <div class="relative">
                <select id="drugSelect" class="w-full pl-4 pr-10 py-3 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-base appearance-none cursor-pointer">
                    <option value="">從當前分類選擇藥物...</option>
                </select>
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
        </div>

        <!-- 藥物列表網格：改為預設 2 欄 (grid-cols-2) -->
        <div id="medicineGrid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-2 md:gap-6 px-1">
            <!-- JS 渲染內容 -->
        </div>

        <!-- 無結果 -->
        <div id="noResults" class="hidden text-center py-20">
            <p class="text-base text-slate-400 font-bold">目前條件下無相符藥物</p>
        </div>
    </div>

    <!-- 影片播放 Modal -->
    <div id="videoModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-2 md:p-4 bg-slate-900/95 shadow-2xl">
        <div class="bg-black rounded-2xl md:rounded-3xl overflow-hidden w-full max-w-4xl relative">
            <button onclick="closeVideo()" class="absolute top-4 right-4 text-white hover:text-red-400 z-10 bg-black/40 rounded-full p-1.5 transition">
                <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <video id="modalPlayer" controls class="w-full h-auto max-h-[85vh] mx-auto"></video>
        </div>
    </div>

    <!-- 全螢幕 QR Code 放大 Modal -->
    <div id="qrModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-900/98 backdrop-blur-sm animate-in fade-in duration-300">
        <div class="w-full max-w-sm bg-white rounded-[2.5rem] p-8 flex flex-col items-center shadow-2xl relative">
            <button onclick="closeQRModal()" class="absolute top-4 right-4 p-2 text-slate-300 hover:text-slate-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div id="qrModalContent" class="text-center w-full">
                <p id="qrDrugName" class="text-xl font-black text-slate-800 mb-1 leading-tight">藥物名稱</p>
                <p class="text-xs font-bold text-blue-500 mb-6 tracking-widest uppercase">掃描觀看衛教影片</p>
                
                <div class="bg-white p-4 rounded-3xl shadow-inner border border-slate-50 mb-8 mx-auto flex items-center justify-center">
                    <img id="qrFullImage" src="" class="w-56 h-56 md:w-72 md:h-72 object-contain" alt="QR Code">
                </div>
                
                <button onclick="closeQRModal()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-black tracking-widest active:scale-95 transition">
                    關閉視窗
                </button>
            </div>
        </div>
    </div>

    <script>
        // 定義 SVG 裝置小圖示庫
        const iconMap = {
            'Respimat': `<svg viewBox="0 0 24 24" class="w-3.5 h-3.5 md:w-4 md:h-4 mr-1 inline-block" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9h8v11a2 2 0 01-2 2h-4a2 2 0 01-2-2V9z" /><path d="M9 9V4a1 1 0 011-1h4a1 1 0 011 1v5" /><line x1="8" y1="16" x2="16" y2="16" /></svg>`,
            'Breezhaler': `<svg viewBox="0 0 24 24" class="w-3.5 h-3.5 md:w-4 md:h-4 mr-1 inline-block" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="10" width="10" height="12" rx="2" /><path d="M9 10V5a1 1 0 011-1h4a1 1 0 011 1v5" /></svg>`,
            'Ellipta': `<svg viewBox="0 0 24 24" class="w-3.5 h-3.5 md:w-4 md:h-4 mr-1 inline-block" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="12" rx="10" ry="7" /><path d="M12 5v14" /><path d="M16 8v8" /></svg>`,
            'Turbuhaler': `<svg viewBox="0 0 24 24" class="w-3.5 h-3.5 md:w-4 md:h-4 mr-1 inline-block" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="4" width="8" height="14" rx="1" /><rect x="7" y="18" width="10" height="4" rx="1" /><line x1="10" y1="18" x2="10" y2="22" /><line x1="14" y1="18" x2="14" y2="22" /></svg>`,
            'Accuhaler': `<svg viewBox="0 0 24 24" class="w-3.5 h-3.5 md:w-4 md:h-4 mr-1 inline-block" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="3" /><path d="M12 2v4" /><path d="M22 12h-4" /></svg>`,
            'Evohaler': `<svg viewBox="0 0 24 24" class="w-3.5 h-3.5 md:w-4 md:h-4 mr-1 inline-block" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4v8H8v4a2 2 0 002 2h4a2 2 0 002-2v-4h4V4H16z" /><rect x="11" y="1" width="6" height="7" rx="1" /></svg>`,
            'Rapihaler': `<svg viewBox="0 0 24 24" class="w-3.5 h-3.5 md:w-4 md:h-4 mr-1 inline-block" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4v8H8v4a2 2 0 002 2h4a2 2 0 002-2v-4h4V4H16z" /><rect x="11" y="1" width="6" height="7" rx="1" /></svg>`,
            '標準MDI': `<svg viewBox="0 0 24 24" class="w-3.5 h-3.5 md:w-4 md:h-4 mr-1 inline-block" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4v8H8v4a2 2 0 002 2h4a2 2 0 002-2v-4h4V4H16z" /><rect x="11" y="1" width="6" height="7" rx="1" /></svg>`,
            '鼻噴劑型': `<svg viewBox="0 0 24 24" class="w-3.5 h-3.5 md:w-4 md:h-4 mr-1 inline-block" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="12" width="10" height="10" rx="2" /><path d="M10 12V6a1 1 0 011-1h2a1 1 0 011 1v6" /><path d="M12 5V2" /></svg>`
        };

        // 取得對應的小圖示
        function getShapeIcon(shape) {
            if (iconMap[shape]) return iconMap[shape];
            if (['類固醇', '抗組織胺', '抗組織胺+類固醇', '局部血管收縮劑', '鴉片類止痛'].includes(shape)) {
                return iconMap['鼻噴劑型'];
            }
            return `<svg viewBox="0 0 24 24" class="w-3.5 h-3.5 md:w-4 md:h-4 mr-1 inline-block" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" /></svg>`;
        }

        const medicines = [
            // SMI (Respimat)
            { main: 'smi', sub: 'LAMA', name: 'Spiriva', cn: '適喘樂', ing: 'Tiotropium', shape: 'Respimat', video: 'https://webapp.cgmh.org.tw/stor/picture/PQB057E20230817171041.mp4', rinse: false },
            { main: 'smi', sub: 'LABA', name: 'Striverdi', cn: '斯力瑞', ing: 'Olodaterol', shape: 'Respimat', video: 'https://webapp.cgmh.org.tw/stor/picture/PQB057E20230817171041.mp4', rinse: false },
            { main: 'smi', sub: 'LABA+LAMA', name: 'Spiolto', cn: '適倍樂', ing: 'Tiotropium / Olodaterol', shape: 'Respimat', video: 'https://webapp.cgmh.org.tw/stor/picture/PQB057E20230817171041.mp4', rinse: false },

            // DPI
            { main: 'dpi', sub: 'LAMA', name: 'Seebri', cn: '喜必樂 (Breezhaler)', ing: 'Glycopyrronium', shape: 'Breezhaler', video: 'https://webapp.cgmh.org.tw/stor/picture/PQB052E20230817165536.mp4', rinse: false },
            { main: 'dpi', sub: 'LABA', name: 'Onbrez', cn: '昂舒', ing: 'Indacaterol', shape: 'Breezhaler', video: 'https://webapp.cgmh.org.tw/stor/picture/PQB052E20230817165536.mp4', rinse: false },
            { main: 'dpi', sub: 'LABA+LAMA', name: 'Ultibro', cn: '昂必樂', ing: 'Indacaterol / Glyco', shape: 'Breezhaler', video: 'https://webapp.cgmh.org.tw/stor/picture/PQB052E20230817165536.mp4', rinse: false },
            { main: 'dpi', sub: 'LABA+LAMA', name: 'Anoro', cn: '安通樂 (Ellipta)', ing: 'Umeclidinium / Vilanterol', shape: 'Ellipta', video: 'https://webapp.cgmh.org.tw/stor/picture/PQB056E20250116120821.mp4', rinse: false },
            { main: 'dpi', sub: 'LABA+ICS', name: 'Relvar', cn: '瑞克沙 (Ellipta)', ing: 'Fluticasone / Vilanterol', shape: 'Ellipta', video: 'https://webapp.cgmh.org.tw/stor/picture/PQB056E20250116120821.mp4', rinse: true },
            { main: 'dpi', sub: 'LABA+ICS', name: 'Seretide Accuhaler', cn: '使肺泰準納', ing: 'Salmeterol / Fluticasone', shape: 'Accuhaler', video: 'https://webapp.cgmh.org.tw/stor/picture/PMA009E20230914192800.mp4', rinse: true },
            { main: 'dpi', sub: 'LABA+ICS', name: 'Symbicort Turbuhaler', cn: '信必可都保', ing: 'Budesonide / Formoterol', shape: 'Turbuhaler', video: 'https://webapp.cgmh.org.tw/stor/picture/PMA005E20230817090020.mp4', rinse: true },
            { main: 'dpi', sub: 'Triple', name: 'Trelegy', cn: '喘立氣 (Ellipta)', ing: 'Flu / Ume / Vil', shape: 'Ellipta', video: 'https://webapp.cgmh.org.tw/stor/picture/PQB056E20250116120821.mp4', rinse: true },
            { main: 'dpi', sub: 'Triple', name: 'Enerzair', cn: '肺舒坦 (Breezhaler)', ing: 'Inda / Glyco / Mome', shape: 'Breezhaler', video: 'https://webapp.cgmh.org.tw/stor/picture/PQB066E20250919154133.mp4', rinse: true },

            // MDI
            { main: 'mdi', sub: 'LABA+LAMA', name: 'Bevespi', cn: '比倍思', ing: 'Glycopyrronium / Formo', shape: '標準MDI', video: 'https://webapp.cgmh.org.tw/stor/picture/PQB065E20231023173208.mp4', rinse: false },
            { main: 'mdi', sub: 'LABA+ICS', name: 'Seretide Evohaler', cn: '使肺泰定量', ing: 'Salmeterol / Fluticasone', shape: 'Evohaler', video: 'https://webapp.cgmh.org.tw/stor/picture/PMA013E20250917153840.mp4', rinse: true },
            { main: 'mdi', sub: 'LABA+ICS', name: 'Symbicort Rapihaler', cn: '信必可定量', ing: 'Budesonide / Formoterol', shape: 'Rapihaler', video: 'https://webapp.cgmh.org.tw/stor/picture/PMA058E20230914191940.mp4', rinse: true },
            { main: 'mdi', sub: 'LABA+ICS', name: 'Foster', cn: '複方定量', ing: 'BDP / Formoterol', shape: '標準MDI', video: 'https://webapp.cgmh.org.tw/stor/picture/PMA034E20240119095130.mp4', rinse: true },
            { main: 'mdi', sub: 'Triple', name: 'Trimbow', cn: '全盈三合一', ing: 'BDP / Formo / Glyco', shape: '標準MDI', video: 'https://webapp.cgmh.org.tw/stor/picture/PQB063E20231023172741.mp4', rinse: true },
            { main: 'mdi', sub: 'SABA', name: 'Ventolin', cn: '萬托林 (SABA)', ing: 'Salbutamol', shape: 'Evohaler', video: 'https://webapp.cgmh.org.tw/stor/picture/PQB054E20231023172513.mp4', rinse: false },
            { main: 'mdi', sub: 'SABA', name: 'Berotec', cn: '備勞喘 (SABA)', ing: 'Fenoterol', shape: '標準MDI', video: 'https://webapp.cgmh.org.tw/stor/picture/PQB015E20231023172308.mp4', rinse: false },
            { main: 'mdi', sub: 'ICS', name: 'Alvesco', cn: '安肺樂 (ICS)', ing: 'Ciclesonide', shape: '標準MDI', video: 'https://webapp.cgmh.org.tw/stor/picture/PMA054E20240119095228.mp4', rinse: true },
            { main: 'mdi', sub: 'ICS', name: 'Duasma', cn: '多適碼 (ICS)', ing: 'Budesonide', shape: '標準MDI', video: 'https://webapp.cgmh.org.tw/stor/picture/PMA007E20231122133102.mp4', rinse: true },

            // 鼻噴劑
            { main: 'nasal', sub: 'Others', name: 'Avamys', cn: '艾敏釋', ing: 'Fluticasone furoate', shape: '類固醇', video: 'https://webapp.cgmh.org.tw/stor/picture/PVA052E20241213175133.mp4', rinse: false },
            { main: 'nasal', sub: 'Others', name: 'Nasonex', cn: '內舒拿', ing: 'Mometasone furoate', shape: '類固醇', video: 'https://webapp.cgmh.org.tw/stor/picture/PVA100E20241213180811.mp4', rinse: false },
            { main: 'nasal', sub: 'Others', name: 'Tisonin', cn: '特索寧 (Trisonia)', ing: 'Triamcinolone', shape: '類固醇', video: 'https://webapp.cgmh.org.tw/stor/picture/PVA001E20241213165924.mp4', rinse: false },
            { main: 'nasal', sub: 'Others', name: 'Dufanas', cn: '帝伏寧', ing: 'Azelastine / Fluticasone', shape: '抗組織胺+類固醇', video: 'https://webapp.cgmh.org.tw/stor/picture/PVA114E20241213173056.mp4', rinse: false },
            { main: 'nasal', sub: 'Others', name: 'Azetin', cn: '噴立停', ing: 'Azelastine', shape: '抗組織胺', video: 'https://webapp.cgmh.org.tw/stor/picture/PVA106E20241213171944.mp4', rinse: false },
            { main: 'nasal', sub: 'Others', name: 'Allergocom', cn: '艾麗', ing: 'Cromolyn', shape: '抗組織胺', video: 'https://webapp.cgmh.org.tw/stor/picture/PZA014E20241213173753.mp4', rinse: false },
            { main: 'nasal', sub: 'Others', name: 'Sindecon', cn: '醫鼻易', ing: 'Oxymetazoline', shape: '局部血管收縮劑', video: 'https://webapp.cgmh.org.tw/stor/picture/PVG010E20241213174519.mp4', rinse: false },
            { main: 'nasal', sub: 'Others', name: 'Butaxo', cn: '全安 (止痛)', ing: 'Butorphanol', shape: '鴉片類止痛', video: 'https://webapp.cgmh.org.tw/stor/picture/017.mp4', rinse: false }
        ];

        let state = { main: 'all', sub: 'all', shape: 'all', search: '' };

        function renderShapeTabs() {
            const container = document.getElementById('shapeTabs');
            
            const relevantMeds = medicines.filter(m => {
                const matchMain = state.main === 'all' || m.main === state.main;
                const matchSub = state.sub === 'all' || m.sub === state.sub;
                return matchMain && matchSub;
            });

            const shapes = [...new Set(relevantMeds.map(m => m.shape))].filter(Boolean).sort();

            let html = `
                <button class="shape-tab flex items-center justify-center ${state.shape === 'all' ? 'active' : ''} px-3 py-1.5 rounded-full text-[11px] md:text-xs font-bold border border-slate-300 text-slate-500 flex-shrink-0" data-shape="all">
                    <svg class="w-3.5 h-3.5 md:w-4 md:h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    不限劑型
                </button>`;

            shapes.forEach(shape => {
                const isActive = state.shape === shape ? 'active' : '';
                const iconSVG = getShapeIcon(shape);
                html += `
                    <button class="shape-tab flex items-center justify-center ${isActive} px-3 py-1.5 rounded-full text-[11px] md:text-xs font-bold border border-slate-300 text-slate-500 flex-shrink-0" data-shape="${shape}">
                        ${iconSVG}
                        ${shape}
                    </button>`;
            });

            container.innerHTML = html;
        }

        function updateDrugOptions(filteredMeds) {
            const select = document.getElementById('drugSelect');
            select.innerHTML = '<option value="">從當前分類選擇藥物...</option>';
            
            const names = [...new Set(filteredMeds.map(m => m.name))].sort();
            names.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                if (state.search === name) option.selected = true;
                select.appendChild(option);
            });
        }

        function render() {
            const grid = document.getElementById('medicineGrid');
            const noResults = document.getElementById('noResults');
            
            const filtered = medicines.filter(m => {
                const matchMain = state.main === 'all' || m.main === state.main;
                const matchSub = state.sub === 'all' || m.sub === state.sub;
                const matchShape = state.shape === 'all' || m.shape === state.shape;
                const matchSearch = m.name.toLowerCase().includes(state.search.toLowerCase()) || 
                                   m.cn.includes(state.search) || 
                                   m.ing.toLowerCase().includes(state.search.toLowerCase());
                return matchMain && matchSub && matchShape && matchSearch;
            });

            const medsForSelect = medicines.filter(m => {
                const matchMain = state.main === 'all' || m.main === state.main;
                const matchSub = state.sub === 'all' || m.sub === state.sub;
                const matchShape = state.shape === 'all' || m.shape === state.shape;
                return matchMain && matchSub && matchShape;
            });
            updateDrugOptions(medsForSelect);

            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }

            noResults.classList.add('hidden');
            grid.innerHTML = filtered.map(m => {
                const rinseBadge = m.rinse ? `
                    <span class="inline-flex items-center gap-0.5 md:gap-1 px-1.5 py-0.5 rounded-md text-[9px] md:text-xs font-bold bg-blue-50 text-blue-600 border border-blue-100 shadow-sm mt-1 sm:mt-0">
                        <svg class="w-2.5 h-2.5 md:w-3.5 md:h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2.019c-1.288 1.458-5.5 6.452-5.5 10.481 0 3.038 2.463 5.5 5.5 5.5s5.5-2.462 5.5-5.5c0-4.029-4.212-9.023-5.5-10.481z" clip-rule="evenodd"></path></svg>
                        需漱口
                    </span>` : '';

                const cardIconSVG = getShapeIcon(m.shape);

                return `
                <div class="med-card bg-white p-3 md:p-6 rounded-2xl md:rounded-[2rem] shadow-sm border border-slate-100 flex flex-col h-full ${getBorderClass(m.sub)}">
                    
                    <!-- 標籤區塊 (適配手機版兩排排版) -->
                    <div class="mb-2 md:mb-4 flex flex-col sm:flex-row gap-1 justify-between items-start sm:items-center">
                        <div class="flex flex-wrap gap-1 items-center">
                            <span class="text-[8px] md:text-[10px] font-black px-1.5 md:px-2 py-0.5 bg-slate-100 rounded-full text-slate-400 uppercase tracking-widest">${m.main}</span>
                            <span class="inline-flex items-center text-[8px] md:text-[10px] font-black px-1.5 md:px-2 py-0.5 bg-purple-50 text-purple-600 rounded-full tracking-widest">
                                ${cardIconSVG} ${m.shape}
                            </span>
                        </div>
                        <span class="text-[8px] md:text-[10px] font-bold px-1.5 md:px-2 py-0.5 bg-blue-50 text-blue-500 rounded-full uppercase tracking-widest">${m.sub}</span>
                    </div>
                    
                    <!-- 藥物名稱與漱口標籤 -->
                    <div class="mb-3 md:mb-5">
                        <div class="flex flex-col gap-0.5 md:gap-1 mb-1 items-start">
                            <h3 class="text-base md:text-2xl font-black text-slate-800 leading-tight">${m.name}</h3>
                            ${rinseBadge}
                        </div>
                        <p class="text-blue-600 font-bold text-xs md:text-lg">${m.cn}</p>
                    </div>

                    <!-- 成分區塊 -->
                    <div class="mb-4 md:mb-6 flex-grow">
                        <p class="text-[8px] md:text-[10px] font-black text-slate-300 uppercase tracking-widest mb-0.5 md:mb-1">主要成分</p>
                        <p class="text-[10px] md:text-sm text-slate-600 font-medium leading-tight md:leading-relaxed">${m.ing}</p>
                    </div>

                    <!-- 按鈕區塊 (手機版自動直排，電腦版橫排) -->
                    <div class="mt-auto flex flex-col xl:flex-row gap-1.5 md:gap-3 pt-3 md:pt-4 border-t border-slate-50">
                        <button onclick="openVideo('${m.video}')" class="flex-1 bg-red-600 text-white px-1 md:px-2 py-2 md:py-3 rounded-xl md:rounded-2xl text-[10px] md:text-xs font-black flex items-center justify-center gap-1 md:gap-1.5 hover:bg-red-700 transition shadow-sm active:scale-95">
                            影片
                        </button>
                        <button onclick="openQRModal('${m.name}', '${m.video}')" class="flex-1 bg-slate-800 text-white px-1 md:px-2 py-2 md:py-3 rounded-xl md:rounded-2xl text-[10px] md:text-xs font-black flex items-center justify-center gap-1 md:gap-1.5 hover:bg-black transition shadow-sm active:scale-95">
                            QRCode
                        </button>
                    </div>
                </div>
            `;
            }).join('');
        }

        function getBorderClass(sub) {
            switch(sub) {
                case 'LABA+ICS': return 'border-laba-ics';
                case 'LABA+LAMA': return 'border-laba-lama';
                case 'LAMA': return 'border-lama';
                case 'Triple': return 'border-triple';
                case 'SABA': return 'border-saba';
                case 'ICS': return 'border-ics';
                default: return 'border-others';
            }
        }

        function openVideo(url) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('modalPlayer');
            player.src = url;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            player.play();
        }

        function closeVideo() {
            document.getElementById('videoModal').classList.add('hidden');
            document.getElementById('modalPlayer').pause();
            document.body.style.overflow = 'auto';
        }

        function openQRModal(name, videoUrl) {
            const modal = document.getElementById('qrModal');
            const qrImg = document.getElementById('qrFullImage');
            const nameLabel = document.getElementById('qrDrugName');
            nameLabel.textContent = name;
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(videoUrl)}`;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeQRModal() {
            document.getElementById('qrModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('mainTabs').addEventListener('click', (e) => {
            const target = e.target.closest('.main-tab');
            if (target) {
                document.querySelectorAll('.main-tab').forEach(btn => btn.classList.remove('active'));
                target.classList.add('active');
                state.main = target.dataset.main;
                state.shape = 'all'; 
                state.search = '';
                document.getElementById('searchInput').value = '';
                renderShapeTabs();
                render();
            }
        });

        document.getElementById('subTabs').addEventListener('click', (e) => {
            const target = e.target.closest('.sub-tab');
            if (target) {
                document.querySelectorAll('.sub-tab').forEach(btn => btn.classList.remove('active'));
                target.classList.add('active');
                state.sub = target.dataset.sub;
                state.shape = 'all'; 
                state.search = ''; 
                document.getElementById('searchInput').value = '';
                renderShapeTabs();
                render();
            }
        });

        document.getElementById('shapeTabs').addEventListener('click', (e) => {
            const target = e.target.closest('.shape-tab');
            if (target) {
                state.shape = target.dataset.shape;
                state.search = '';
                document.getElementById('searchInput').value = '';
                renderShapeTabs();
                render();
            }
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            state.search = e.target.value;
            render();
        });
        
        document.getElementById('drugSelect').addEventListener('change', (e) => {
            state.search = e.target.value;
            document.getElementById('searchInput').value = e.target.value;
            render();
        });

        window.onclick = function(event) {
            if (event.target == document.getElementById('videoModal')) closeVideo();
            if (event.target == document.getElementById('qrModal')) closeQRModal();
        };

        window.onload = function() {
            renderShapeTabs();
            render(); 
        };
    </script>
</body>
</html>
