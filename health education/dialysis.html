<script>
const topics = [
  { name: '腹膜透析環境介紹',     url: 'https://drive.google.com/file/d/17c6jxag6QtLzP6p109HJ4jWTHf3UN15Z/view?usp=drive_link' },
  { name: '全自動腹膜透析換液流程', url: 'https://drive.google.com/file/d/10PlAn6EfB7S5vN1iDA8zJ-s8OTwf7ghw/view?usp=sharing' },
  { name: '連續性腹膜透析換液流程', url: 'https://drive.google.com/file/d/19s7ChvcOZGj8aCJyeJzeaG2GX4hBCAuJ/view?usp=drive_link' },
  { name: '透析液進出異常',       url: 'https://drive.google.com/file/d/1KqrXitwCNMiMeMLe2TSh5f4JL5z0JpTe/view?usp=sharing' },
  { name: '導管意外事件',         url: 'https://drive.google.com/file/d/1zuAeRNtQf-TkKQytpujllj01wNLVo2R0/view?usp=sharing' },
  { name: '腹膜炎',               url: 'https://drive.google.com/file/d/1isWQbwg_3ZPTZ7JjfDSI6D7SART0BtQ8/view?usp=sharing' },
  { name: '導管出口感染',         url: 'https://drive.google.com/file/d/1psxzkVrGwhWvFgfKJn6FM0LBhx8NoLzb/view?usp=sharing' },
  { name: '導管出口照護',         url: 'https://drive.google.com/file/d/1RiXu54gFxZs3Ukq1KLyVaNZKEAzQKc_W/view?usp=sharing' },
  { name: '居家注意事項',         url: 'https://drive.google.com/file/d/1sQ3HYJgy1y3PZ_X28wdpCe2LFsysVGon/view?usp=sharing' },
  { name: '透析飲食',             url: 'https://drive.google.com/file/d/1FZ_6uzTnM-oIHt7bLYhw16YTfCsVZaWg/view?usp=sharing' },
  { name: '水分控制',             url: 'https://drive.google.com/file/d/1cWbQg8VE_NwhMqhAsbX5Lr3vMs8ZLAgX/view?usp=sharing' },
  { name: '透析機清潔及連線步驟', url: 'https://drive.google.com/file/d/15df56t5DrSXsH24X9AeEOZLxdxR6UpT8/view?usp=sharing' },
  { name: '預防跌倒',             url: 'https://drive.google.com/file/d/1JZwVdM9IDF7FgHKub0HpAhorBOOrswec/view?usp=sharing' },
  { name: '出國相關衛教',         url: 'https://drive.google.com/file/d/1XcjJ8QQAdFezpC-HWfikbx4puUDKZ_ys/view?usp=sharing' },
  { name: '醫病共享決策輔助表',   url: 'https://drive.google.com/file/d/1ukG55jEp91dOa68x9eFVuieP7r9pdHwj/view?usp=sharing' },
  { name: '腎移植衛教',           url: 'https://drive.google.com/file/d/18wJQNUqkWKwxK_P6iHrInPWLXbTfH5Ur/view?usp=sharing' },
];

const grid = document.getElementById('grid');

topics.forEach((t, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = `${i * 0.04}s`;

  const qrId = `qr-${i}`;
  card.innerHTML = `
    <h2>${t.name}</h2>
    <div class="qr-wrapper" id="${qrId}"></div>
    <a class="btn" href="${t.url}" target="_blank">查看衛教資料</a>
  `;
  grid.appendChild(card);

  setTimeout(() => {
    const wrapper = document.getElementById(qrId);
    new QRCode(wrapper, { text: t.url, width: 120, height: 120, colorDark: '#1a2030', colorLight: '#ffffff' });
  }, 0);
});
