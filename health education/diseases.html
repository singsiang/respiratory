<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --teal: #0a7e78; --teal-light: #14b8a6; --gold: #c9a84c; --cream: #f8f6f1; --dark: #1a2e2d; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); min-height: 100vh; padding: 2rem 1rem 4rem; }
  
  .back { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--teal); text-decoration: none; font-weight: 700; font-size: 0.9rem; margin-bottom: 2rem; }

  .header { text-align: center; margin-bottom: 2.5rem; }
  .tag { display: inline-block; background: var(--gold); color: white; font-size: 0.75rem; font-weight: 700; padding: 0.3rem 1rem; border-radius: 100px; letter-spacing: 0.1em; margin-bottom: 1rem; }
  h1 { font-size: clamp(1.6rem, 5vw, 2.4rem); font-weight: 900; color: var(--dark); }
  .sub { color: #888; margin-top: 0.5rem; font-size: 0.95rem; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.25rem; max-width: 1000px; margin: 2rem auto 0; }

  .card { background: white; border-radius: 16px; padding: 1.5rem 1rem; text-align: center; box-shadow: 0 2px 16px rgba(10,126,120,0.07); border-top: 4px solid var(--gold); transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(10,126,120,0.14); }
  .card h2 { font-size: 1rem; font-weight: 900; color: var(--dark); margin-bottom: 1rem; line-height: 1.5; }

  .qr-wrapper { display: flex; justify-content: center; margin-bottom: 1rem; }
  .qr-placeholder { width: 120px; height: 120px; background: #f5f5f5; border: 2px dashed #ddd; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 0.7rem; }

  .btn { display: inline-block; padding: 0.45rem 1.1rem; background: var(--gold); color: white; border-radius: 100px; text-decoration: none; font-size: 0.8rem; font-weight: 700; transition: background 0.2s; }
  .btn:hover { background: #b8923b; }
  .btn-placeholder { display: inline-block; padding: 0.45rem 1.1rem; background: #ddd; color: #aaa; border-radius: 100px; font-size: 0.8rem; font-weight: 700; }

  .note { text-align: center; margin-top: 3rem; color: #aaa; font-size: 0.8rem; }

  html, body { height: 100%; }
  body { display: flex; min-height: 100vh; }
  .sidebar { width: 260px; flex-shrink: 0; background: #1a2e2d; color: white; display: flex; flex-direction: column; padding: 2rem 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .sidebar-header { padding: 0 1.5rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 1rem; }
  .sidebar-hospital { font-size: 0.75rem; color: #14b8a6; font-weight: 700; letter-spacing: 0.12em; margin-bottom: 0.4rem; }
  .sidebar-title { font-size: 1.1rem; font-weight: 900; line-height: 1.4; }
  .nav-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em; color: rgba(255,255,255,0.35); padding: 0.5rem 1.5rem 0.4rem; }
  .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; text-decoration: none; color: rgba(255,255,255,0.65); font-size: 0.9rem; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
  .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.07); color: white; }
  .nav-item.active { border-left-color: #14b8a6; }
  .nav-icon { font-size: 1.15rem; flex-shrink: 0; }
  .nav-count { margin-left: auto; font-size: 0.7rem; background: rgba(255,255,255,0.12); padding: 0.15rem 0.5rem; border-radius: 99px; color: rgba(255,255,255,0.45); }
  .main-wrap { flex: 1; padding: 2.5rem 2.5rem; min-width: 0; }
  @media (max-width: 680px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: static; flex-direction: row; flex-wrap: wrap; padding: 0.75rem; gap: 0.3rem; }
    .sidebar-header, .nav-label { display: none; }
    .nav-item { padding: 0.5rem 0.75rem; border-left: none; border-radius: 8px; font-size: 0.78rem; flex-direction: column; gap: 0.1rem; text-align: center; }
    .nav-count { display: none; }
    .main-wrap { padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>

<div class="main-wrap">
<a class="back" href="index.html">← 返回首頁</a>

<div class="header">
  <div class="tag">外科加護病房</div>
  <h1>常見疾病 QR Code</h1>
  <div class="sub">基隆長庚醫院外科加護病房與您一起關心身體健康</div>
</div>

<div class="grid" id="grid"></div>

<div class="note">基隆長庚醫院外科加護病房　·　人本濟世　勤勞樸實</div>

<script>
// =============================================
// 填入各疾病衛教連結（掃 QR Code 後取得的 URL）
// =============================================
const diseases = [
  { name: '心臟手術後照護',   url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00079&s=q' },
  { name: '認識口腔癌',       url: 'https://webapp.cgmh.org.tw/healthedu/view/health_cntt.aspx?artno=00323&s=q' },
  { name: '認識食道癌',       url: 'https://webapp.cgmh.org.tw/healthedu/view/health_cntt.aspx?artno=00539&s=q' },
  { name: '認識肺癌',         url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00324&s=q' },
  { name: '認識胰臟癌',       url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00464&s=q' },
  { name: '認識肝癌',         url: 'https://webapp.cgmh.org.tw/healthedu/view/health_cntt.aspx?artno=00178&s=q' },
  { name: '認識胃癌',         url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00481&s=q' },
  { name: '創傷性血胸照護',   url: 'https://webapp.cgmh.org.tw/healthedu/view/health_cntt.aspx?artno=00538&s=q' },
  { name: '認識動脈瘤',       url: 'https://webapp.cgmh.org.tw/healthedu/view/health_cntt.aspx?artno=00450&s=q' },
  { name: '認識腦中風',       url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00339&s=q' },
  { name: '認識腦腫瘤',       url: 'https://webapp.cgmh.org.tw/healthedu/view/health_cntt.aspx?artno=00112&s=q' },
  { name: '認識腦下垂體腫瘤', url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00111&s=q' },
  { name: '認識頸椎疾病',     url: 'https://webapp.cgmh.org.tw/healthedu/view/health_cntt.aspx?artno=00416&s=q' },
  { name: '認識大腸癌',       url: 'https://webapp.cgmh.org.tw/healthedu/view/health_cntt.aspx?artno=00034&s=q' },
  { name: '認識腸道阻塞',     url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00453&s=q' },
  { name: '灼(燙)傷照護',     url: 'https://webapp.cgmh.org.tw/healthedu/view/health_cntt.aspx?artno=00556&s=q' },
];

const grid = document.getElementById('grid');

diseases.forEach((d, i) => {
  const card = document.createElement('div');
  card.className = 'card';

  const qrId = `qr-${i}`;
  const btnId = `btn-${i}`;

  card.innerHTML = `
    <h2>${d.name}</h2>
    <div class="qr-wrapper" id="${qrId}">
      <div class="qr-placeholder">待填入連結</div>
    </div>
    ${d.url
      ? `<a class="btn" href="${d.url}" target="_blank">查看衛教</a>`
      : `<span class="btn-placeholder" id="${btnId}">查看衛教</span>`
    }
  `;

  grid.appendChild(card);

  if (d.url) {
    setTimeout(() => {
      const wrapper = document.getElementById(qrId);
      wrapper.innerHTML = '';
      new QRCode(wrapper, { text: d.url, width: 120, height: 120, colorDark: '#1a2e2d', colorLight: '#ffffff' });
    }, 0);
  }
});
</script>

</div>
</body>
