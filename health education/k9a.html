  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.25rem; max-width: 1000px; margin: 0 auto; }

  .card { background: white; border-radius: 16px; padding: 1.5rem 1rem; text-align: center; box-shadow: 0 2px 16px rgba(26,110,74,0.08); border-top: 4px solid var(--green-light); transition: transform 0.2s, box-shadow 0.2s; animation: fadeUp 0.5s ease both; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(26,110,74,0.16); }
  .card h2 { font-size: 1rem; font-weight: 900; color: var(--dark); margin-bottom: 1rem; line-height: 1.5; }

  .qr-wrapper { display: flex; justify-content: center; margin-bottom: 1rem; min-height: 120px; align-items: center; }

  .btn { display: inline-block; padding: 0.45rem 1.2rem; background: var(--green); color: white; border-radius: 100px; text-decoration: none; font-size: 0.82rem; font-weight: 700; transition: background 0.2s, transform 0.15s; }
  .btn:hover { background: var(--green-light); transform: scale(1.03); }

  .note { text-align: center; margin-top: 3rem; color: #aaa; font-size: 0.8rem; }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px);} to { opacity:1; transform:none;} }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px);} to { opacity:1; transform:none;} }

  html, body { height: 100%; }

<div class="note">基隆長庚醫院 K9A病房　·　人本濟世　勤勞樸實</div>

<script>
const topics = [
  { name: 'B型肝炎',     url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00514&s=q' },
  { name: '肝硬化',       url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00349&s=q' },
  { name: '肝癌',         url: 'https://webapp.cgmh.org.tw/healthedu/view/health_cntt.aspx?artno=00178&s=q' },
  { name: '膽道結石',     url: 'https://webapp.cgmh.org.tw/healthedu/view/health_cntt.aspx?artno=00045&s=q' },
  { name: '膽管阻塞',     url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00467&s=q' },
  { name: '上腸胃道出血', url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00083&s=q' },
  { name: '消化性潰瘍',   url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00126&s=q' },
  { name: '胃癌',         url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00481&s=q' },
  { name: '胰臟炎',       url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00208&s=q' },
  { name: '憩室炎',       url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00475&s=q' },
  { name: '大腸直腸癌',   url: 'https://webapp.cgmh.org.tw/healthedu/view/health_cntt.aspx?artno=00034&s=q' },
  { name: '腸道阻塞',     url: 'https://www.cgmh.org.tw/asproot/healthedu/view/health_cntt.aspx?artno=00453&s=q' },
];

const grid = document.getElementById('grid');

topics.forEach((t, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = `${i * 0.05}s`;

  const qrId = `qr-${i}`;
  card.innerHTML = `
    <h2>${t.name}</h2>
    <div class="qr-wrapper" id="${qrId}"></div>
    <a class="btn" href="${t.url}" target="_blank">查看衛教資料</a>
  `;
  grid.appendChild(card);

  setTimeout(() => {
    const wrapper = document.getElementById(qrId);
    new QRCode(wrapper, { text: t.url, width: 120, height: 120, colorDark: '#1a2e20', colorLight: '#ffffff' });
  }, 0);
});
</script>
