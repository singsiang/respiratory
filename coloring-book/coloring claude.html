<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🖍️ 小寶貝著色本</title>
<style>
  :root { --bg:#FFF9F0; --accent:#FF6B6B; --yellow:#FFD93D; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:var(--bg); font-family:'Helvetica Neue',Arial,sans-serif;
    overflow:hidden; height:100dvh; display:flex; flex-direction:column;
    user-select:none; touch-action:none;
  }
  #topbar {
    background:#fff; border-bottom:3px solid var(--yellow);
    padding:8px 12px; display:flex; align-items:center; gap:10px;
    flex-shrink:0; box-shadow:0 2px 8px rgba(0,0,0,.08); z-index:10;
  }
  #topbar h1 { font-size:19px; color:var(--accent); font-weight:900; flex:1; text-align:center; }
  .nav-btn {
    background:var(--yellow); border:none; border-radius:14px;
    padding:8px 15px; font-size:20px; cursor:pointer;
    box-shadow:0 3px 0 #e6b800; line-height:1; min-width:48px; transition:transform .1s;
  }
  .nav-btn:active { transform:translateY(2px); box-shadow:0 1px 0 #e6b800; }
  #page-indicator { font-size:12px; font-weight:700; color:#999; min-width:48px; text-align:center; }
  #main { display:flex; flex:1; overflow:hidden; position:relative; }
  #canvas-area { flex:1; display:flex; align-items:center; justify-content:center; padding:8px; position:relative; }
  #canvas-wrap { position:relative; border-radius:18px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,.15); }
  #canvas-bg, #canvas-fg { position:absolute; top:0; left:0; display:block; touch-action:none; }
  #canvas-bg { z-index:3; pointer-events:none; }
  #canvas-fg { z-index:2; cursor:crosshair; }
  #sidebar {
    width:68px; background:#fff; border-left:3px solid var(--yellow);
    display:flex; flex-direction:column; align-items:center;
    padding:8px 0; gap:5px; overflow-y:auto; flex-shrink:0;
  }
  .color-swatch {
    width:50px; height:50px; border-radius:12px;
    border:4px solid transparent; cursor:pointer; flex-shrink:0;
    transition:transform .1s, border-color .1s;
    box-shadow:0 2px 6px rgba(0,0,0,.18);
    position:relative; overflow:hidden;
  }
  .color-swatch::after {
    content:''; position:absolute; inset:0;
    background:repeating-linear-gradient(90deg,rgba(255,255,255,.18) 0px,rgba(255,255,255,.18) 1px,transparent 1px,transparent 4px);
    mix-blend-mode:overlay; pointer-events:none;
  }
  .color-swatch:active { transform:scale(.9); }
  .color-swatch.active { border-color:#222; transform:scale(1.1); box-shadow:0 4px 14px rgba(0,0,0,.32); }
  .sidebar-divider { width:38px; height:2px; background:#eee; flex-shrink:0; border-radius:2px; }
  .tool-btn {
    width:50px; height:50px; border-radius:14px;
    border:4px solid transparent; background:#f0f0f0;
    cursor:pointer; font-size:22px; display:flex;
    align-items:center; justify-content:center; flex-shrink:0;
    transition:transform .1s; box-shadow:0 2px 6px rgba(0,0,0,.1);
  }
  .tool-btn:active { transform:scale(.9); }
  .tool-btn.active { border-color:#333; background:#e0e0e0; }
  #bottombar {
    background:#fff; border-top:3px solid var(--yellow);
    padding:7px 12px; display:flex; align-items:center;
    justify-content:space-between; flex-shrink:0; gap:6px;
  }
  #brush-sizes { display:flex; gap:6px; align-items:center; }
  .brush-btn {
    background:#f5f5f5; border:3px solid transparent; border-radius:50%;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:transform .1s; flex-shrink:0;
  }
  .brush-btn:active { transform:scale(.9); }
  .brush-btn.active { border-color:#333; background:#e8e8e8; }
  .brush-btn .dot { background:#333; border-radius:50%; }
  .action-btn {
    background:#f0f0f0; border:none; border-radius:14px;
    padding:9px 13px; font-size:20px; cursor:pointer;
    box-shadow:0 3px 0 #ddd; line-height:1; transition:transform .1s;
  }
  .action-btn:active { transform:translateY(2px); box-shadow:none; }
  #clear-btn { background:#FFE0E0; box-shadow:0 3px 0 #ffb3b3; }
  #save-btn  { background:#E0FFE8; box-shadow:0 3px 0 #a3d9ae; }
  #fill-indicator {
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.72); color:#fff; padding:6px 14px;
    border-radius:20px; font-size:13px; font-weight:700;
    pointer-events:none; opacity:0; transition:opacity .3s; white-space:nowrap;
  }
  #fill-indicator.show { opacity:1; }
  .confetti-piece {
    position:fixed; width:10px; height:10px; border-radius:2px;
    animation:cffall 2s ease-out forwards; pointer-events:none; z-index:999;
  }
  @keyframes cffall {
    0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
  }
</style>
</head>
<body>
<div id="topbar">
  <button class="nav-btn" id="prev-btn">◀</button>
  <h1 id="page-title">🌸 花朵</h1>
  <span id="page-indicator">1/12</span>
  <button class="nav-btn" id="next-btn">▶</button>
</div>
<div id="main">
  <div id="canvas-area">
    <div id="canvas-wrap">
      <canvas id="canvas-fg"></canvas>
      <canvas id="canvas-bg"></canvas>
    </div>
    <div id="fill-indicator">🪣 填色模式</div>
  </div>
  <div id="sidebar"></div>
</div>
<div id="bottombar">
  <div id="brush-sizes">
    <button class="brush-btn active" data-size="6"  style="width:32px;height:32px;"><div class="dot" style="width:7px;height:7px;"></div></button>
    <button class="brush-btn"        data-size="14" style="width:40px;height:40px;"><div class="dot" style="width:13px;height:13px;"></div></button>
    <button class="brush-btn"        data-size="26" style="width:50px;height:50px;"><div class="dot" style="width:21px;height:21px;"></div></button>
  </div>
  <button class="action-btn" id="fill-btn">🪣</button>
  <button class="action-btn" id="undo-btn">↩️</button>
  <button class="action-btn" id="clear-btn">🗑️</button>
  <button class="action-btn" id="save-btn">💾</button>
</div>
<script>
const pages = [
  { name:'🌸 花朵',   draw:drawFlower    },
  { name:'🐱 貓咪',   draw:drawCat       },
  { name:'🦕 恐龍',   draw:drawDino      },
  { name:'🏠 房子',   draw:drawHouse     },
  { name:'🌈 彩虹',   draw:drawRainbow   },
  { name:'🍄 蘑菇',   draw:drawMushroom  },
  { name:'🐠 魚魚',   draw:drawFish      },
  { name:'🦋 蝴蝶',   draw:drawButterfly },
  { name:'🚂 火車',   draw:drawTrain     },
  { name:'🐧 企鵝',   draw:drawPenguin   },
  { name:'🍦 冰淇淋', draw:drawIcecream  },
  { name:'🌟 星星',   draw:drawStar      },
];
const COLORS=[
  {hex:'#E8001E',name:'紅色'},{hex:'#FF6200',name:'橙色'},{hex:'#FFD000',name:'黃色'},
  {hex:'#00A832',name:'綠色'},{hex:'#0062D6',name:'藍色'},{hex:'#7B00D4',name:'紫色'},
  {hex:'#FF3FA4',name:'粉紅'},{hex:'#00B4CC',name:'水藍'},{hex:'#9B5523',name:'棕色'},
  {hex:'#FF9DC0',name:'淺粉'},{hex:'#A8E063',name:'嫩綠'},{hex:'#FFB347',name:'杏色'},
  {hex:'#444444',name:'深灰'},{hex:'#FFFFFF',name:'白色'},
];
let currentPage=0,currentColor='#E8001E',brushSize=6;
let isDrawing=false,lastX=0,lastY=0,isFillMode=false,isEraser=false,history=[];
const wrap=document.getElementById('canvas-wrap');
const bgCvs=document.getElementById('canvas-bg');
const fgCvs=document.getElementById('canvas-fg');
const bgCtx=bgCvs.getContext('2d');
const fgCtx=fgCvs.getContext('2d');

function resizeCanvas(){
  const area=document.getElementById('canvas-area');
  const size=Math.min(area.clientWidth-16,area.clientHeight-16);
  [bgCvs,fgCvs].forEach(c=>{c.width=size;c.height=size;c.style.width=size+'px';c.style.height=size+'px';});
  wrap.style.width=size+'px'; wrap.style.height=size+'px';
  history=[]; loadPage(currentPage);
}

const sidebar=document.getElementById('sidebar');
function buildSidebar(){
  sidebar.innerHTML='';
  COLORS.forEach(c=>{
    const btn=document.createElement('div');
    btn.className='color-swatch'+(c.hex===currentColor?' active':'');
    btn.style.background=c.hex; btn.title=c.name;
    if(c.hex==='#FFFFFF') btn.style.boxShadow='0 2px 6px rgba(0,0,0,.12),inset 0 0 0 1px #ccc';
    btn.addEventListener('click',()=>{
      currentColor=c.hex; isEraser=false;
      document.querySelectorAll('.color-swatch').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelector('[data-tool="eraser"]')?.classList.remove('active');
    });
    sidebar.appendChild(btn);
  });
  sidebar.appendChild(Object.assign(document.createElement('div'),{className:'sidebar-divider'}));
  const eb=document.createElement('div');
  eb.className='tool-btn'; eb.dataset.tool='eraser'; eb.textContent='🧹'; eb.title='橡皮擦';
  eb.addEventListener('click',()=>{
    isEraser=!isEraser; eb.classList.toggle('active',isEraser);
    if(isEraser) document.querySelectorAll('.color-swatch').forEach(b=>b.classList.remove('active'));
  });
  sidebar.appendChild(eb);
}

function getPos(e){
  const rect=fgCvs.getBoundingClientRect();
  const sx=fgCvs.width/rect.width, sy=fgCvs.height/rect.height;
  const src=(e.touches&&e.touches.length>0)?e.touches[0]:e;
  return{x:(src.clientX-rect.left)*sx, y:(src.clientY-rect.top)*sy};
}

// ── CRAYON ENGINE ──
function crayonStroke(x0,y0,x1,y1,size,hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const dist=Math.hypot(x1-x0,y1-y0);
  const steps=Math.max(1,Math.ceil(dist/2));
  for(let s=0;s<=steps;s++){
    const t=s/steps, cx=x0+(x1-x0)*t, cy=y0+(y1-y0)*t;
    for(let strand=0;strand<3;strand++){
      const ox=(Math.random()-.5)*size*.55, oy=(Math.random()-.5)*size*.55;
      const rad=size*(.35+Math.random()*.35), alpha=.10+Math.random()*.18;
      const angle=Math.atan2(y1-y0,x1-x0);
      fgCtx.save();
      fgCtx.globalCompositeOperation='multiply';
      fgCtx.beginPath();
      fgCtx.translate(cx+ox,cy+oy); fgCtx.rotate(angle+(Math.random()-.5)*.4); fgCtx.scale(1.6,1);
      const grad=fgCtx.createRadialGradient(0,0,0,0,0,rad);
      grad.addColorStop(0,`rgba(${r},${g},${b},${alpha})`);
      grad.addColorStop(.6,`rgba(${r},${g},${b},${alpha*.6})`);
      grad.addColorStop(1,`rgba(${r},${g},${b},0)`);
      fgCtx.arc(0,0,rad,0,Math.PI*2); fgCtx.fillStyle=grad; fgCtx.fill(); fgCtx.restore();
    }
  }
}
function crayonDot(x,y,size,hex){crayonStroke(x,y,x+.5,y+.5,size,hex);}
function eraseAt(x,y){
  fgCtx.save(); fgCtx.globalCompositeOperation='destination-out';
  fgCtx.beginPath(); fgCtx.arc(x,y,brushSize*2.5,0,Math.PI*2);
  fgCtx.fillStyle='rgba(0,0,0,1)'; fgCtx.fill(); fgCtx.restore();
}

function startDraw(e){
  e.preventDefault();
  const pos=getPos(e);
  if(isFillMode){saveHistory();crayonFill(Math.round(pos.x),Math.round(pos.y),currentColor);return;}
  isDrawing=true; lastX=pos.x; lastY=pos.y; saveHistory();
  if(isEraser) eraseAt(pos.x,pos.y); else crayonDot(pos.x,pos.y,brushSize,currentColor);
}
function drawMove(e){
  if(!isDrawing)return; e.preventDefault();
  const pos=getPos(e);
  if(isEraser) eraseAt(pos.x,pos.y); else crayonStroke(lastX,lastY,pos.x,pos.y,brushSize,currentColor);
  lastX=pos.x; lastY=pos.y;
}
function endDraw(){isDrawing=false;}
fgCvs.addEventListener('mousedown',startDraw); fgCvs.addEventListener('mousemove',drawMove);
fgCvs.addEventListener('mouseup',endDraw); fgCvs.addEventListener('mouseleave',endDraw);
fgCvs.addEventListener('touchstart',startDraw,{passive:false});
fgCvs.addEventListener('touchmove',drawMove,{passive:false});
fgCvs.addEventListener('touchend',endDraw);

// ── CRAYON FLOOD FILL ──
function hexToRgba(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16),255];}
function colorsMatch(a,b,tol){return Math.abs(a[0]-b[0])<=tol&&Math.abs(a[1]-b[1])<=tol&&Math.abs(a[2]-b[2])<=tol&&Math.abs(a[3]-b[3])<=tol;}

function crayonFill(sx,sy,hex){
  const W=fgCvs.width,H=fgCvs.height;
  const off=new OffscreenCanvas(W,H);
  const offCtx=off.getContext('2d');
  offCtx.fillStyle='#fff'; offCtx.fillRect(0,0,W,H);
  offCtx.drawImage(bgCvs,0,0); offCtx.drawImage(fgCvs,0,0);
  const composite=offCtx.getImageData(0,0,W,H),cdata=composite.data;
  const si=(sy*W+sx)*4;
  const target=[cdata[si],cdata[si+1],cdata[si+2],cdata[si+3]];
  const fill=hexToRgba(hex);
  if(colorsMatch(target,[0,0,0,255],80)||colorsMatch(target,fill,20))return;
  const mask=new Uint8Array(W*H),stack=[[sx,sy]],visited=new Uint8Array(W*H);
  visited[sy*W+sx]=1;
  while(stack.length){
    const[x,y]=stack.pop();
    if(x<0||x>=W||y<0||y>=H)continue;
    const i=y*W+x,pi=i*4;
    if(!colorsMatch([cdata[pi],cdata[pi+1],cdata[pi+2],cdata[pi+3]],target,55))continue;
    mask[i]=1;
    for(const[nx,ny]of[[x+1,y],[x-1,y],[x,y+1],[x,y-1]]){
      const ni=ny*W+nx;
      if(nx>=0&&nx<W&&ny>=0&&ny<H&&!visited[ni]){visited[ni]=1;stack.push([nx,ny]);}
    }
  }
  const fgImg=fgCtx.getImageData(0,0,W,H),fdata=fgImg.data;
  const[fr,fg,fb]=fill;
  for(let i=0;i<W*H;i++){
    if(!mask[i])continue;
    const pi=i*4;
    const noise=Math.random(),stripe=Math.sin((i%W)*2.1+Math.random()*.5)*.5+.5;
    const alpha=160+Math.floor(stripe*noise*80);
    if(fdata[pi+3]===0){fdata[pi]=fr;fdata[pi+1]=fg;fdata[pi+2]=fb;fdata[pi+3]=alpha;}
    else{fdata[pi]=Math.floor(fr*(fdata[pi]||255)/255);fdata[pi+1]=Math.floor(fg*(fdata[pi+1]||255)/255);fdata[pi+2]=Math.floor(fb*(fdata[pi+2]||255)/255);fdata[pi+3]=Math.min(255,fdata[pi+3]+alpha*(1-fdata[pi+3]/255));}
  }
  fgCtx.putImageData(fgImg,0,0);
}

function saveHistory(){history.push(fgCvs.toDataURL());if(history.length>20)history.shift();}
document.getElementById('undo-btn').addEventListener('click',()=>{
  if(!history.length)return;
  const img=new Image();
  img.onload=()=>{fgCtx.clearRect(0,0,fgCvs.width,fgCvs.height);fgCtx.drawImage(img,0,0);};
  img.src=history.pop();
});
document.querySelectorAll('.brush-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.brush-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); brushSize=parseInt(btn.dataset.size);
  });
});
const fillBtn=document.getElementById('fill-btn'),fillInd=document.getElementById('fill-indicator');
fillBtn.addEventListener('click',()=>{
  isFillMode=!isFillMode;
  fillBtn.style.background=isFillMode?'#FFD700':'#f0f0f0';
  fillInd.classList.toggle('show',isFillMode);
  if(isFillMode)setTimeout(()=>fillInd.classList.remove('show'),2200);
});
document.getElementById('clear-btn').addEventListener('click',()=>{
  saveHistory(); fgCtx.clearRect(0,0,fgCvs.width,fgCvs.height);
  fgCtx.fillStyle='#fff'; fgCtx.fillRect(0,0,fgCvs.width,fgCvs.height);
});
document.getElementById('save-btn').addEventListener('click',()=>{
  const out=document.createElement('canvas');
  out.width=fgCvs.width; out.height=fgCvs.height;
  const oc=out.getContext('2d');
  oc.fillStyle='#fff'; oc.fillRect(0,0,out.width,out.height);
  oc.drawImage(fgCvs,0,0); oc.drawImage(bgCvs,0,0);
  const a=document.createElement('a');
  a.download='coloring-book.png'; a.href=out.toDataURL('image/png'); a.click(); confetti();
});
document.getElementById('prev-btn').addEventListener('click',()=>{currentPage=(currentPage-1+pages.length)%pages.length;history=[];loadPage(currentPage);});
document.getElementById('next-btn').addEventListener('click',()=>{currentPage=(currentPage+1)%pages.length;history=[];loadPage(currentPage);});

function loadPage(i){
  bgCtx.clearRect(0,0,bgCvs.width,bgCvs.height);
  fgCtx.clearRect(0,0,fgCvs.width,fgCvs.height);
  fgCtx.fillStyle='#fff'; fgCtx.fillRect(0,0,fgCvs.width,fgCvs.height);
  pages[i].draw(bgCtx,bgCvs.width,bgCvs.height);
  document.getElementById('page-indicator').textContent=`${i+1}/${pages.length}`;
  document.getElementById('page-title').textContent=pages[i].name;
}

function confetti(){
  const cols=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF9F43'];
  for(let i=0;i<44;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='confetti-piece';
      el.style.left=Math.random()*100+'vw'; el.style.top='-10px';
      el.style.background=cols[Math.floor(Math.random()*cols.length)];
      el.style.animationDelay=Math.random()*.5+'s';
      el.style.transform=`rotate(${Math.random()*360}deg)`;
      document.body.appendChild(el); setTimeout(()=>el.remove(),2500);
    },i*28);
  }
}

// ── DRAW HELPERS ──
function ss(c,lw){c.strokeStyle='#111';c.lineWidth=lw||5;c.lineCap='round';c.lineJoin='round';}
function starPath(ctx,cx,cy,ro,ri,pts){
  pts=pts||5; ctx.beginPath();
  for(let i=0;i<pts*2;i++){
    const r=i%2===0?ro:ri,a=(i/(pts*2))*Math.PI*2-Math.PI/2;
    i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
  }
  ctx.closePath();
}
// ── DRAWING PAGES ──

function drawFlower(ctx,W,H){
  const cx=W/2,cy=H*.46,r=W*.12;
  ss(ctx,5);
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;ctx.beginPath();ctx.ellipse(cx+Math.cos(a)*r*1.9,cy+Math.sin(a)*r*1.9,r*.72,r*.48,a,0,Math.PI*2);ctx.stroke();}
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  ctx.lineWidth=3;for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.beginPath();ctx.arc(cx+Math.cos(a)*r*.5,cy+Math.sin(a)*r*.5,3,0,Math.PI*2);ctx.fill();}ctx.lineWidth=5;
  ctx.beginPath();ctx.moveTo(cx,cy+r);ctx.bezierCurveTo(cx-18,cy+r*2.2,cx+18,cy+r*3.2,cx,cy+r*4.5);ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx+W*.09,cy+r*2.4,W*.12,W*.055,Math.PI/4,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx-W*.09,cy+r*3.3,W*.12,W*.055,-Math.PI/4,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx,H*.9,W*.22,H*.035,0,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(W*.83,H*.12,W*.08,0,Math.PI*2);ctx.stroke();
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;ctx.beginPath();ctx.moveTo(W*.83+Math.cos(a)*W*.105,H*.12+Math.sin(a)*W*.105);ctx.lineTo(W*.83+Math.cos(a)*W*.14,H*.12+Math.sin(a)*W*.14);ctx.stroke();}
  [[W*.14,H*.8],[W*.82,H*.78]].forEach(([fx,fy])=>{
    ctx.beginPath();ctx.arc(fx,fy,W*.05,0,Math.PI*2);ctx.stroke();
    for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2;ctx.beginPath();ctx.ellipse(fx+Math.cos(a)*W*.07,fy+Math.sin(a)*W*.07,W*.04,W*.025,a,0,Math.PI*2);ctx.stroke();}
    ctx.beginPath();ctx.moveTo(fx,fy+W*.05);ctx.lineTo(fx,fy+W*.13);ctx.stroke();
  });
}

function drawCat(ctx,W,H){
  const cx=W/2,cy=H*.4,hr=W*.22;ss(ctx,5);
  ctx.beginPath();ctx.arc(cx,cy,hr,0,Math.PI*2);ctx.stroke();
  [[cx-hr*.72,cy-hr*.68,cx-hr*.42,cy-hr*1.38,cx-hr*.06,cy-hr*.78],
   [cx+hr*.72,cy-hr*.68,cx+hr*.42,cy-hr*1.38,cx+hr*.06,cy-hr*.78]].forEach(p=>{
    ctx.beginPath();ctx.moveTo(p[0],p[1]);ctx.lineTo(p[2],p[3]);ctx.lineTo(p[4],p[5]);ctx.closePath();ctx.stroke();

  for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(cx+i*W*.05,H*.5);ctx.lineTo(cx+i*W*.025,H*.88);ctx.stroke();}
  ctx.lineWidth=5;
  ctx.beginPath();ctx.arc(cx,H*.42,W*.2,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx-W*.04,H*.24,W*.17,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+W*.03,H*.09,W*.14,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+W*.03,H*.04,W*.04,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+W*.03,H*.04);ctx.quadraticCurveTo(cx+W*.1,H*.03,cx+W*.12,H*0);ctx.stroke();
  ctx.lineWidth=4;
  [[-W*.12,H*.38,-20],[W*.08,H*.35,15],[-W*.06,H*.45,35],[W*.14,H*.42,-10],
   [-W*.1,H*.22,25],[W*.06,H*.2,-30],[W*.08,H*.1,15],[-W*.08,H*.08,-20]].forEach(([ox,oy,ang])=>{
    const x=cx+ox,y=oy,rad=ang*Math.PI/180;
    ctx.beginPath();ctx.moveTo(x+Math.cos(rad)*8,y+Math.sin(rad)*8);ctx.lineTo(x-Math.cos(rad)*8,y-Math.sin(rad)*8);ctx.stroke();
  });
  ctx.lineWidth=5;
  [cx-W*.1,cx+W*.06].forEach(dx=>{ctx.beginPath();ctx.moveTo(dx,H*.5);ctx.bezierCurveTo(dx-8,H*.56,dx+8,H*.6,dx,H*.66);ctx.stroke();});
}

function drawStar(ctx,W,H){
  const cx=W/2,cy=H*.4;ss(ctx,5);
  starPath(ctx,cx,cy,W*.28,W*.12,5);ctx.stroke();
  ctx.lineWidth=3;for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.beginPath();ctx.arc(cx+Math.cos(a)*W*.1,cy+Math.sin(a)*W*.1,4,0,Math.PI*2);ctx.fill();}ctx.lineWidth=5;
  [[W*.15,H*.14,W*.09,W*.038],[W*.82,H*.18,W*.1,W*.04],
   [W*.08,H*.52,W*.07,W*.028],[W*.88,H*.5,W*.08,W*.032],
   [W*.48,H*.12,W*.065,W*.026],[W*.28,H*.72,W*.05,W*.02],
   [W*.72,H*.7,W*.055,W*.022]].forEach(([x,y,ro,ri])=>{starPath(ctx,x,y,ro,ri,5);ctx.stroke();});
  ctx.beginPath();ctx.arc(W*.78,H*.7,W*.1,Math.PI*.18,Math.PI*1.82);ctx.stroke();
  ctx.beginPath();ctx.arc(W*.78+W*.06,H*.7,W*.09,Math.PI*1.82,Math.PI*.18,true);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,H*.82);ctx.quadraticCurveTo(W*.25,H*.68,W*.5,H*.8);ctx.quadraticCurveTo(W*.75,H*.68,W,H*.76);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.stroke();
  ctx.lineWidth=3;
  [[W*.38,H*.78],[W*.5,H*.76],[W*.62,H*.79]].forEach(([bx,by])=>{
    ctx.strokeRect(bx-12,by-H*.06,24,H*.06);
    ctx.beginPath();ctx.moveTo(bx-14,by-H*.06);ctx.lineTo(bx,by-H*.1);ctx.lineTo(bx+14,by-H*.06);ctx.stroke();
  });
  ctx.lineWidth=5;
}
